<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentrophi</title>
  <meta name="description" content="Mentrophi is a conversational AI assistant with lightweight background research when needed." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg: #17181c;
      --sidebar: #141519;
      --panel: #23242a;
      --panel-soft: #1f2025;
      --border: rgba(255,255,255,.08);
      --text: #f3f3f5;
      --muted: #9a9aa3;
      --muted-2: #777781;
      --accent: #5b8cff;
      --accent-soft: rgba(91,140,255,.18);
      --shadow: 0 16px 40px rgba(0,0,0,.32);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --codebg: #0f1013;
      --codehead: #17191f;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    button, input, textarea { font: inherit; color: inherit; }
    button { background: transparent; border: 0; padding: 0; cursor: pointer; appearance: none; }
    a { color: inherit; text-decoration: none; }

    .app { position: relative; display: grid; grid-template-columns: 272px minmax(0,1fr); min-height: 100vh; transition: grid-template-columns .28s ease; }
    .app.artifact-open { grid-template-columns: 272px minmax(0,1fr) minmax(360px,44vw); }
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.46); backdrop-filter:blur(6px); z-index:20; }

    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid rgba(255,255,255,.04);
      padding: 18px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 30;
    }
    .sidebar-head { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .brand { display:flex; gap:10px; align-items:center; font-size:12px; font-weight:700; letter-spacing:.14em; }
    .brand span:first-child {
      display:grid; place-items:center; width:24px; height:24px; border-radius:999px;
      background: linear-gradient(135deg, #7d5cff, #5b8cff); color:#fff; font-size:11px;
    }
    .sidebar-close { display:none; width:32px; height:32px; align-items:center; justify-content:center; color:var(--text); font-size:18px; border-radius:10px; border:1px solid var(--border); }
    .new-chat {
      display:flex; align-items:center; justify-content:space-between; width:100%; text-align:left;
      padding:13px 14px; border-radius:16px; font-weight:600; color:var(--text);
      background: var(--panel); border:1px solid var(--border); transition: all .2s ease;
    }
    .new-chat::after { content:'+'; font-size:20px; color:var(--muted); line-height:1; }
    .new-chat:hover { border-color: rgba(255,255,255,.16); transform: translateY(-1px); }
    .history-title { font-size:11px; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; padding-top:10px; border-top:1px solid rgba(255,255,255,.06); }
    .history-list { display:grid; gap:8px; align-content:start; }
    .history-item {
      padding:12px; font-size:12px; color:var(--muted); text-align:left;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      border-radius:14px; border:1px solid transparent; transition: all .18s ease;
    }
    .history-item.active, .history-item:hover { color:var(--text); background:var(--panel); border-color: rgba(255,255,255,.06); }

    .main { display:flex; flex-direction:column; min-width:0; }
    .topbar {
      position: sticky; top: 0; z-index: 15;
      height: 54px; padding: 0 14px;
      display: grid; grid-template-columns: 40px minmax(0,1fr) 40px; align-items:center;
      background: #17181c; border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .topbar-right { display:flex; align-items:center; justify-content:flex-end; }
    .menu-btn, .top-action {
      display:grid; place-items:center; width:32px; height:32px; border-radius:999px;
      color:#d8d8dd; font-size:20px;
    }
    .menu-btn { display:none; }
    .top-action { font-size:18px; }
    .top-query { font-size:15px; font-weight:600; text-align:center; color:#f3f3f5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 10px; }
    .status { color:var(--muted); font-size:9px; letter-spacing:.12em; text-transform:uppercase; }
    .sr-only { position:absolute !important; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

    .main-stage { flex:1; display:flex; flex-direction:column; min-height:0; }
    .content-wrap { flex:1; overflow:auto; padding:0 16px 104px; }
    .article-shell { max-width:1020px; margin:0 auto; width:100%; }
    .thread-shell { max-width:860px; margin:0 auto; width:100%; }

    .home-state { min-height: calc(100svh - 54px); display:grid; place-items:center; padding:0; }
    .home-shell { width:min(100%,720px); display:grid; gap:14px; justify-items:center; text-align:center; align-content:center; }
    .home-badge { display:none; }
    .hero-title { font-size: clamp(36px,4.6vw,56px); font-weight:700; letter-spacing:-0.045em; line-height:1.08; max-width:11ch; margin:0; }
    .hero-subtitle { margin:0; max-width:520px; color:var(--muted); font-size:14px; line-height:1.6; }
    .hero-mark, .home-composer-wrap, .home-footnote { display:none; }
    .chips { display:flex; gap:8px; justify-content:center; flex-wrap:nowrap; max-width:100%; overflow:auto hidden; scrollbar-width:none; padding-bottom:2px; }
    .chips::-webkit-scrollbar { display:none; }
    .chip {
      flex:0 0 auto; border-radius:999px; padding:10px 14px; white-space:nowrap;
      color:#d2d2d8; background:#202126; border:1px solid rgba(255,255,255,.06);
      transition:all .18s ease;
    }
    .chip:hover { color:#fff; border-color:rgba(255,255,255,.12); }

    .thread { display:none; }
    .thread.active { display:block; }
    .message { margin:0 0 34px; }
    .message.user { display:flex; justify-content:flex-end; }
    .message.assistant { display:block; }
    .message.user .message-body {
      max-width:min(62%,320px); padding:13px 16px; border-radius:22px;
      background:#2a2a2f; color:#fff;
    }
    .message.assistant .message-body { max-width:100%; padding:0; }
    .message-body { font-size:15px; line-height:1.84; overflow-wrap:anywhere; }
    .message-body h1,.message-body h2,.message-body h3,.message-body h4 { line-height:1.18; font-weight:700; letter-spacing:-0.03em; margin:1.35em 0 .72em; }
    .message-body h2 { font-size:22px; }
    .message-body h1:first-child,.message-body h2:first-child,.message-body p:first-child { margin-top:0; }
    .message-body p,.message-body li { font-size:15px; line-height:1.82; margin:0 0 16px; color:var(--text); }
    .message-body ul,.message-body ol { padding-left:1.3rem; }
    .message-body sup a { color:var(--accent); text-decoration:none; font-size:.8em; vertical-align:super; }
    .message-body blockquote { border-left:2px solid rgba(91,140,255,.45); margin:1rem 0 1.5rem; padding-left:1rem; color:var(--muted); }
    .message-body pre { display:none; }
    .message-body code { font-family:'JetBrains Mono','SF Mono','Fira Code',monospace; }
    .placeholder { color:var(--muted); padding:24px 0; }

    .debate-inline{margin:0 0 12px}
    .debate-toggle{display:inline-flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none}
    .debate-toggle-text{position:relative;display:inline-block}
    .debate-toggle.running .debate-toggle-text{background:linear-gradient(90deg, rgba(255,255,255,.4) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,.4) 100%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:debateShimmer 1.2s linear infinite}
    .debate-toggle-caret{font-size:11px;color:var(--muted)}
    @keyframes debateShimmer{0%{background-position:120% 0}100%{background-position:-120% 0}}
    .review-panel{margin:0 0 18px;border-radius:18px;overflow:hidden;background:#1e1f24;border:1px solid rgba(255,255,255,.06)}
    .review-body{padding:14px 16px;display:grid;gap:10px}
    .review-round{display:grid;gap:8px;padding:10px 0}.review-round + .review-round{border-top:1px solid rgba(255,255,255,.06)}
    .review-round-meta{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
    .review-turn{display:grid;gap:4px;padding:10px 12px;border-radius:14px;background:#24252b;border:1px solid rgba(255,255,255,.04)}
    .review-agent-name{font-size:12px;font-weight:600;color:var(--text)}
    .review-turn-message{font-size:12px;line-height:1.6;color:var(--muted)}

    .artifact-cards{display:grid;gap:12px;margin:16px 0 26px}
    .artifact-card{border-radius:18px;padding:15px 16px;background:#1e1f24;border:1px solid rgba(255,255,255,.06)}
    .artifact-meta{display:flex;justify-content:space-between;gap:12px;align-items:center}.artifact-name{font-size:14px;font-weight:600;color:var(--text)}.artifact-open{color:var(--accent);font-size:13px;font-weight:500}.artifact-subtle{color:var(--muted);font-size:12px;margin-top:4px}

    .share-wrap{margin:12px 0 24px}.share-btn,.toast-copy{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(91,140,255,.3);color:var(--accent);padding:9px 12px;border-radius:999px;background:rgba(255,255,255,.02)}.share-btn[disabled]{opacity:.5;cursor:not-allowed}.toast{position:fixed;right:20px;bottom:92px;padding:12px 14px;max-width:320px;display:none;z-index:40;border-radius:16px;background:rgba(10,10,12,.9)}.toast.show{display:block}

    .sources-inline{margin-top:20px;padding-top:0}.sources-footnotes{display:grid;gap:8px;color:var(--muted);font-size:12px;line-height:1.6;opacity:.96;padding:14px 16px;border-radius:18px;background:#1e1f24;border:1px solid rgba(255,255,255,.06)}.sources-footnotes a{text-decoration:none;border-bottom:1px solid transparent}.sources-footnotes a:hover{border-color:currentColor}.sources-footnotes .domain{color:var(--muted)}.sources-footnotes .footnote-index{color:var(--muted)}

    .bottom-composer{display:none;position:fixed;left:272px;right:0;bottom:0;background:linear-gradient(to top, rgba(23,24,28,.96) 60%, rgba(23,24,28,0));padding:10px 0 calc(10px + env(safe-area-inset-bottom));transition:right .3s ease;backdrop-filter:blur(8px)}
    .bottom-composer.visible{display:block}.app.artifact-open .bottom-composer{right:min(360px,44vw)}
    .bottom-composer .composer{max-width:860px;margin:0 auto;padding:0 12px}
    .bottom-composer .composer-shell{border-radius:24px;padding:16px 16px 14px;grid-template-columns:1fr auto;grid-template-areas:'input send' 'tools tools';row-gap:12px;background:#24252b;border:1px solid rgba(255,255,255,.06);box-shadow:none}
    .bottom-composer .composer-left{grid-area:tools}
    .bottom-composer .composer-input{grid-area:input;font-size:15px;padding:0 2px 0 0}
    .bottom-composer .send-btn{grid-area:send}
    .bottom-composer .composer-menu{top:auto;bottom:calc(100% + 12px)}
    .composer-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .mode-pill{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.08);color:var(--muted);background:transparent;font-size:13px;transition:all .2s ease}
    .mode-pill.active{color:#dce4ff;border-color:rgba(91,140,255,.28);background:rgba(91,140,255,.12)}
    .composer-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
    .icon-btn{display:grid;place-items:center;width:32px;height:32px;border-radius:999px;color:var(--muted);border:1px solid rgba(255,255,255,.06)}
    .icon-btn:hover,.mode-pill:hover{color:var(--text);border-color:rgba(255,255,255,.12)}

    .artifact-panel{position:relative;border-left:1px solid rgba(255,255,255,.08);background:var(--codebg);color:#f4f4f4;transform:translateX(100%);transition:transform .3s ease;overflow:hidden;display:flex;flex-direction:column;box-shadow:-20px 0 40px rgba(0,0,0,.36)}
    .app.artifact-open .artifact-panel{transform:translateX(0)}
    .artifact-header{display:flex;align-items:center;gap:10px;justify-content:space-between;padding:14px 16px;background:var(--codehead);border-bottom:1px solid rgba(255,255,255,.08)}
    .artifact-left{display:flex;align-items:center;gap:10px;min-width:0}.artifact-close{color:#fff;font-size:18px;width:28px;height:28px;display:grid;place-items:center;border-radius:10px;background:rgba(255,255,255,.06)}.artifact-tabs{display:flex;gap:8px;overflow:auto}.artifact-tab{padding:7px 11px;border:1px solid rgba(255,255,255,.12);color:#ddd;white-space:nowrap;border-radius:10px}.artifact-tab.active{background:rgba(255,255,255,.08);color:#fff}.artifact-actions{display:flex;gap:8px}.artifact-action{padding:7px 11px;border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:10px}.artifact-body{flex:1;overflow:auto}.artifact-body pre{margin:0;padding:22px}.artifact-body code{font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;font-size:14px;line-height:1.6}.artifact-markdown{font-size:15px;line-height:1.8}.artifact-markdown p{margin:0 0 16px}.artifact-markdown h1,.artifact-markdown h2,.artifact-markdown h3{font-weight:700;line-height:1.2;margin:1.2em 0 .6em}.artifact-markdown ul,.artifact-markdown ol{padding-left:1.2rem}

    @media (max-width:900px){
      .app,.app.artifact-open{grid-template-columns:1fr}
      .overlay.open{display:block}
      .sidebar{position:fixed;inset:0 auto 0 0;width:272px;transform:translateX(-100%);transition:transform .25s ease;box-shadow:12px 0 30px rgba(0,0,0,.22)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-close{display:inline-flex}
      .menu-btn{display:grid}
      .topbar{padding:0 12px;height:52px}
      .content-wrap{padding:0 0 104px}
      .article-shell{padding:0 12px}
      .thread-shell{padding:0}
      .home-state{min-height:calc(100svh - 52px - env(safe-area-inset-bottom));align-items:center;text-align:center;padding:0}
      .home-shell{justify-items:center;text-align:center;gap:14px;align-content:center}
      .hero-title{font-size:clamp(30px, 9.2vw, 38px);max-width:10ch;line-height:1.08}
      .hero-subtitle{font-size:13px;line-height:1.55;max-width:28ch}
      .chips{justify-content:center;gap:8px;margin-right:0;padding-right:0}
      .bottom-composer{left:0;right:0;padding:10px 0 calc(10px + env(safe-area-inset-bottom))}
      .app.artifact-open .bottom-composer{right:0}
      .bottom-composer .composer{padding:0 12px}
      .message.user .message-body{max-width:min(74%,240px)}
      .toast{left:16px;right:16px;max-width:none}
      .artifact-panel{position:fixed;inset:0;z-index:35;border-left:0;width:100%}
    }
  </style>
</head>
<body>
  <div id="overlay" class="overlay"></div>
  <div id="app" class="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head"><div class="brand"><span>◆</span><span>MENTROPHI</span></div><button id="sidebarClose" class="sidebar-close" aria-label="Close sidebar">✕</button></div>
      <button id="newChatBtn" class="new-chat">New chat</button>
      <div class="history-title">Recents</div>
      <div id="historyList" class="history-list"></div>
    </aside>
    <main class="main">
      <header class="topbar"><button id="menuBtn" class="menu-btn">☰</button><div id="topQuery" class="top-query">New chat</div><div class="topbar-right"><div id="statusText" class="status sr-only">Idle</div><button id="topNewChatBtn" class="top-action" aria-label="New chat">⊕</button></div></header>
      <div class="main-stage">
        <div class="content-wrap">
          <div class="article-shell">
            <section id="homeState" class="home-state">
              <div class="home-shell">
                <div class="home-badge">Mentrophi</div>
                <h1 class="hero-title">How can I help you?</h1>
                <p class="hero-subtitle">Mentrophi quietly researches when needed, but always feels like normal chat.</p>
                <div class="chips"><button class="chip" data-query="Climate tipping points">Climate tipping points</button><button class="chip" data-query="How LLMs work">How LLMs work</button><button class="chip" data-query="Stoicism today">Stoicism today</button></div>
              </div>
            </section>
            <section id="threadView" class="thread"><div class="thread-shell"><div id="threadBody"></div></div></section>
          </div>
        </div>
        <div id="bottomComposer" class="bottom-composer"><div class="composer"><div class="composer-shell"><input id="followupInput" class="composer-input" type="text" placeholder="Type a message" autocomplete="off" /><button id="followupSend" type="button" class="send-btn" aria-label="Send">↑</button><div class="composer-left composer-tools"><button type="button" class="mode-pill" data-toggle-debate="true">✳ Debate</button><div class="composer-actions"><button id="followupPlus" type="button" class="icon-btn" aria-label="More options">+</button><button type="button" class="icon-btn" aria-label="Voice">◔</button></div><div id="followupMenu" class="composer-menu"><button type="button" class="composer-menu-item" data-toggle-debate="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h7l2 3h7"></path><path d="M6 17h7l2-3h5"></path><circle cx="6" cy="7" r="2"></circle><circle cx="18" cy="17" r="2"></circle></svg><span class="composer-menu-label"><span class="composer-menu-title">Debate</span><span class="composer-menu-meta">Off</span></span></button></div></div></div></div></div>
      </div>
    </main>
    <aside id="artifactPanel" class="artifact-panel" aria-hidden="true"><div class="artifact-header"><div class="artifact-left"><button id="artifactClose" class="artifact-close" aria-label="Close artifact">✕</button><div id="artifactTabs" class="artifact-tabs"></div></div><div class="artifact-actions"><button id="artifactCopy" class="artifact-action">Copy</button><button id="artifactDownload" class="artifact-action">↓</button></div></div><div class="artifact-body"><div id="artifactMarkdown" class="artifact-markdown" style="display:none;padding:22px;color:#f4f4f4"></div><pre id="artifactPre"><code id="artifactCode"></code></pre></div></aside>
  </div>
  <div id="toast" class="toast"></div>
  <script>
    const STORAGE_KEY='mentrophi-history-v2';
    const state={sessions:[],activeSessionId:null,currentAnswer:'',currentSources:[],abortController:null,currentMeta:{codeMode:false},artifactFiles:[],activeArtifactIndex:0,twoAgentReview:false};
    const app=document.getElementById('app'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('overlay'),menuBtn=document.getElementById('menuBtn'),sidebarClose=document.getElementById('sidebarClose'),newChatBtn=document.getElementById('newChatBtn'),historyList=document.getElementById('historyList'),homeState=document.getElementById('homeState'),threadView=document.getElementById('threadView'),threadBody=document.getElementById('threadBody'),homeInput=document.getElementById('homeInput'),homeSend=document.getElementById('homeSend'),followupInput=document.getElementById('followupInput'),followupSend=document.getElementById('followupSend'),bottomComposer=document.getElementById('bottomComposer'),statusText=document.getElementById('statusText'),topQuery=document.getElementById('topQuery'),toast=document.getElementById('toast'),artifactPanel=document.getElementById('artifactPanel'),artifactTabs=document.getElementById('artifactTabs'),artifactCode=document.getElementById('artifactCode'),artifactMarkdown=document.getElementById('artifactMarkdown'),artifactPre=document.getElementById('artifactPre'),artifactClose=document.getElementById('artifactClose'),artifactCopy=document.getElementById('artifactCopy'),artifactDownload=document.getElementById('artifactDownload'),homePlus=document.getElementById('homePlus'),followupPlus=document.getElementById('followupPlus'),homeMenu=document.getElementById('homeMenu'),followupMenu=document.getElementById('followupMenu'),topNewChatBtn=document.getElementById('topNewChatBtn');
    marked.setOptions({breaks:true,gfm:true});
    function escapeHtml(text=''){return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
    function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('open');} function openSidebar(){sidebar.classList.add('open');overlay.classList.add('open');}
    function openArtifact(index=0){state.activeArtifactIndex=index;app.classList.add('artifact-open');artifactPanel.setAttribute('aria-hidden','false');renderArtifactPanel();}
    function closeArtifact(){app.classList.remove('artifact-open');artifactPanel.setAttribute('aria-hidden','true');}
    function defaultSession(){return {id:crypto.randomUUID(),title:'New chat',query:'',history:[],messages:[],meta:{codeMode:false},twoAgentReview:state.twoAgentReview}}
    function migrateSessions(raw=[]){return raw.map(session=>({id:session.id||crypto.randomUUID(),title:session.title||session.query||'New chat',query:session.query||'',history:Array.isArray(session.history)?session.history:[],messages:Array.isArray(session.messages)?session.messages:(session.answer?[{role:'assistant',content:session.answer,sources:session.sources||[],meta:session.meta||{}}]:[]),meta:session.meta||{codeMode:false},twoAgentReview:typeof session.twoAgentReview==='boolean'?session.twoAgentReview:false}));}
    function saveSessions(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.sessions));}
    function loadSessions(){try{state.sessions=migrateSessions(JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'));}catch{state.sessions=[];}}
    function createSession(initialQuery=''){const session=defaultSession(); if(initialQuery){session.title=initialQuery.slice(0,42); session.query=initialQuery;} state.sessions.unshift(session); state.activeSessionId=session.id; saveSessions(); renderHistory(); return session;}
    function getActiveSession(){return state.sessions.find(session=>session.id===state.activeSessionId)||null}
    function renderHistory(){historyList.innerHTML=state.sessions.map(session=>`<button class="history-item ${session.id===state.activeSessionId?'active':''}" data-id="${session.id}">${escapeHtml(session.title||'New chat')}</button>`).join(''); historyList.querySelectorAll('.history-item').forEach(button=>button.addEventListener('click',()=>{openSession(button.dataset.id); closeSidebar();}));}
    function showToast(html){toast.innerHTML=html;toast.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>toast.classList.remove('show'),4000)}
    async function copyText(text){try{await navigator.clipboard.writeText(text);return true}catch{return false}}
    function inferExtension(lang=''){const map={js:'js',javascript:'js',ts:'ts',typescript:'ts',py:'py',python:'py',html:'html',css:'css',json:'json',sql:'sql',sh:'sh',bash:'sh',tsx:'tsx',jsx:'jsx'};return map[(lang||'').toLowerCase()]||'txt'}
    function languageLabel(lang=''){const map={js:'JavaScript',javascript:'JavaScript',ts:'TypeScript',typescript:'TypeScript',py:'Python',python:'Python',html:'HTML',css:'CSS',json:'JSON',sql:'SQL',sh:'Shell',bash:'Shell'};return map[(lang||'').toLowerCase()]||((lang||'Text').replace(/^./,c=>c.toUpperCase()))}
    function extractCodeBlocks(markdown=''){const blocks=[];const regex=/```([\w#+.-]*)\n([\s\S]*?)(```|$)/g;let match;let idx=1;while((match=regex.exec(markdown))){const language=(match[1]||'').toLowerCase();const content=(match[2]||'').trim();if(!content) continue;blocks.push({name:`app-${idx}.${inferExtension(language)}`,language,content,incomplete:match[3]!== '```',kind:'code'});idx+=1}return blocks}
    function extractWritingArtifact(markdown=''){const prose=(markdown||'').replace(/```[\w#+.-]*\n[\s\S]*?(?:```|$)/g,'').trim(); if(!prose) return []; const paragraphCount=prose.split(/\n\s*\n/).filter(Boolean).length; const looksStructured=/(^|\n)(#|##|###|[-*] |\d+\. )/m.test(prose); const substantial=prose.length>1400 || paragraphCount>=6 || (prose.length>900 && looksStructured); if(!substantial) return []; return [{name:'draft.md',language:'markdown',content:prose,incomplete:false,kind:'writing'}]; }
    function emptyReview(){return {open:false,running:false,timeline:[]};}
    function renderReviewPanel(review,index){if(!review || (!review.running && (!Array.isArray(review.timeline) || !review.timeline.length))) return ''; const turnCount=(review.timeline||[]).length; const rounds=[]; const grouped=new Map(); (review.timeline||[]).forEach(item=>{const key=String(item.round||1); if(!grouped.has(key)) grouped.set(key,[]); grouped.get(key).push(item);}); grouped.forEach((items,key)=>{const body=items.map(item=>`<div class="review-turn"><div class="review-agent-name">${escapeHtml(item.agent)}</div><div class="review-turn-message">${escapeHtml(item.text||'')}</div></div>`).join(''); rounds.push(`<section class="review-round"><div class="review-round-meta">Round ${escapeHtml(key)}</div>${body}</section>`);}); const label=review.running?'Builder and Critic reviewing…':`View Builder/Critic debate (${turnCount} turns)`; return `<div class="debate-inline"><button class="debate-toggle ${review.running?'running':''}" type="button" data-review-toggle="${index}"><span class="debate-toggle-text">${label}</span><span class="debate-toggle-caret">${review.open?'Hide':'Open'}</span></button>${review.open?`<div class="review-panel"><div class="review-body">${rounds.join('')||'<div class="review-turn-message">Starting review…</div>'}</div></div>`:''}</div>`;}
    function renderArtifactPanel(){const files=state.artifactFiles||[];const active=files[state.activeArtifactIndex]||files[0];if(!active){artifactTabs.innerHTML='';artifactCode.textContent='';artifactMarkdown.innerHTML='';return;}artifactTabs.innerHTML=files.map((file,index)=>`<button class="artifact-tab ${index===state.activeArtifactIndex?'active':''}" data-index="${index}">${escapeHtml(file.kind==='writing'?'draft.md':file.name)}${file.incomplete?'…':''}</button>`).join('');artifactTabs.querySelectorAll('.artifact-tab').forEach(btn=>btn.addEventListener('click',()=>{state.activeArtifactIndex=Number(btn.dataset.index);renderArtifactPanel();})); if(active.kind==='writing'){artifactPre.style.display='none';artifactMarkdown.style.display='block';artifactMarkdown.innerHTML=marked.parse(active.content||'');} else {artifactMarkdown.style.display='none';artifactPre.style.display='block';artifactCode.className=active.language?`language-${active.language}`:'';artifactCode.textContent=active.content||'';if(window.hljs){window.hljs.highlightElement(artifactCode);}}}
    async function shareFiles(files, query=''){files=(files||[]).filter(file=>!file.incomplete);if(!files.length)return;const btn=document.querySelector('.share-btn');if(btn)btn.disabled=true;try{const res=await fetch('/api/snippet/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({files,query})});const data=await res.json();if(!res.ok)throw new Error(data.error||'Failed to share');showToast(`Shared! <a class="toast-copy" href="${data.url}" target="_blank">${data.url}</a>`);const link=toast.querySelector('.toast-copy');if(link)link.addEventListener('click',async(e)=>{e.preventDefault();await copyText(data.url);showToast('Link copied.');window.open(data.url,'_blank');},{once:true});}catch(error){showToast(escapeHtml(error.message))}finally{if(btn)btn.disabled=false;}}
    function renderMessageContent(message,index){const reviewHtml=message.role==='assistant'?renderReviewPanel(message.review,index):''; const codeFiles=extractCodeBlocks(message.content||''); const writingFiles=codeFiles.length?[]:extractWritingArtifact(message.content||''); const files=[...codeFiles,...writingFiles]; const proseSource=(message.content||'').replace(/```[\w#+.-]*\n[\s\S]*?(?:```|$)/g,'').trim(); let html=proseSource?marked.parse(proseSource):''; const superscriptDigits={'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'}; html=html.replace(/\[(\d+)\]/g,(_,n)=>`<sup><a href="#source-${index+1}-${n}">${String(n).split('').map(d=>superscriptDigits[d]||d).join('')}</a></sup>`); if(writingFiles.length){const previewParas=proseSource.split(/\n\s*\n/).filter(Boolean).slice(0,2).join('\n\n'); html=previewParas?marked.parse(previewParas):html; } let extra=reviewHtml; if(files.length){extra += `<div class="artifact-cards">${files.map((file,fileIndex)=>`<div class="artifact-card"><div class="artifact-meta"><div><div class="artifact-name">${escapeHtml(file.kind==='writing'?'Long-form draft':file.name)}</div><div class="artifact-subtle">${escapeHtml(file.kind==='writing'?'Open separately for reading or editing':languageLabel(file.language))}${file.incomplete?' · generating…':''}</div></div><button class="artifact-open" data-file-index="${fileIndex}" data-message-index="${index}">Open</button></div></div>`).join('')}</div>`; const shareableFiles = files.filter(file=>!file.incomplete && file.kind==='code'); if(shareableFiles.length){extra += `<div class="share-wrap"><button class="share-btn" data-message-index="${index}">◆ Share this code</button></div>`; }}
      if(message.role==='assistant' && Array.isArray(message.sources) && message.sources.length){ extra += `<section class="sources-inline"><div class="sources-footnotes">${message.sources.map((source,sourceIndex)=>{const n=sourceIndex+1; const sup=String(n).split('').map(d=>superscriptDigits[d]||d).join(''); const domain=source.domain||source.displayUrl||''; return `<div id="source-${index+1}-${n}"><span class="footnote-index">${sup}</span> <a href="${escapeHtml(source.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(source.title||'Untitled source')}</a> <span class="domain">— ${escapeHtml(domain)}</span></div>`}).join('')}</div></section>`; }
      if(!html && files.length){html = '<p>I put the code into an artifact so you can open it while it finishes generating.</p>'; } else if(!html && message.role==='assistant' && Array.isArray(message.sources) && message.sources.length){html = '<p>I found useful sources, but the answer stream came back incomplete. Try sending it once more and it should answer normally.</p>'; }
      return html + extra;
    }
    function renderThread(){const session=getActiveSession(); if(!session||!session.messages.length){threadBody.innerHTML='<div class="placeholder">Start a conversation.</div>';  return;} threadBody.innerHTML=session.messages.map((message,index)=>{const review=message.review||{}; const turnCount=Array.isArray(review.timeline)?review.timeline.length:0; const attrs=message.role==='assistant'&&((review.running)||turnCount)?` data-debate-active="true" data-debate-turn-count="${turnCount}"`:''; return `<article class="message ${message.role}"${attrs}><div class="message-body">${renderMessageContent(message,index)}</div></article>`;}).join(''); threadBody.querySelectorAll('.artifact-open').forEach(btn=>btn.addEventListener('click',()=>{const msg=session.messages[Number(btn.dataset.messageIndex)]; const codeFiles=extractCodeBlocks(msg.content||''); const writingFiles=codeFiles.length?[]:extractWritingArtifact(msg.content||''); state.artifactFiles=[...codeFiles,...writingFiles]; openArtifact(Number(btn.dataset.fileIndex));})); threadBody.querySelectorAll('.share-btn').forEach(btn=>btn.addEventListener('click',()=>{const msg=session.messages[Number(btn.dataset.messageIndex)]; shareFiles(extractCodeBlocks(msg.content||''), session.query||session.title||'');})); }
    function setStatus(text){statusText.textContent=text}
    function setDebateEnabled(enabled){state.twoAgentReview=!!enabled; document.querySelectorAll('[data-toggle-debate="true"]').forEach(item=>{const meta=item.querySelector('.composer-menu-meta'); if(meta) meta.textContent=state.twoAgentReview?'On':'Off'; item.classList.toggle('active',state.twoAgentReview);}); syncPlusButtons(); persistComposerFlags();}
    function syncPlusButtons(){[homePlus,followupPlus].forEach(btn=>btn&&btn.classList.toggle('active',state.twoAgentReview));}
    function persistComposerFlags(){const session=getActiveSession(); if(session){session.twoAgentReview=state.twoAgentReview; saveSessions();}}
    function closeComposerMenus(){[homeMenu,followupMenu].forEach(menu=>menu&&menu.classList.remove('open'));}
    function toggleComposerMenu(menu){const willOpen=!menu.classList.contains('open'); closeComposerMenus(); if(willOpen) menu.classList.add('open');}
    function bindComposerMenu(button,menu){if(!button||!menu) return; button.addEventListener('click',(e)=>{e.preventDefault(); e.stopPropagation(); toggleComposerMenu(menu);}); menu.querySelectorAll('[data-toggle-debate="true"]').forEach(item=>item.addEventListener('click',()=>{setDebateEnabled(!state.twoAgentReview); closeComposerMenus();}));}
        function showHome(){homeState.style.display='grid';threadView.classList.remove('active');topQuery.textContent='New chat';threadBody.innerHTML='';bottomComposer.classList.add('visible');followupInput.placeholder='Type a message';closeArtifact();setStatus('Idle');}
    function showThread(session){homeState.style.display='none';threadView.classList.add('active');topQuery.textContent=session.title||session.query||'Chat';renderThread();bottomComposer.classList.add('visible');followupInput.placeholder='Type a message';setStatus('Ready');}
    function openSession(sessionId){state.activeSessionId=sessionId;renderHistory();const session=getActiveSession(); setDebateEnabled(!!session?.twoAgentReview); if(!session||!session.messages.length)showHome();else showThread(session);saveSessions();}
    async function runResearch(query){const trimmed=query.trim(); if(!trimmed) return; if(state.abortController) state.abortController.abort(); state.abortController=new AbortController(); let session=getActiveSession(); if(!session) session=createSession(trimmed); if(!session.messages.length && session.title==='New chat'){session.title=trimmed.slice(0,42); session.query=trimmed;} session.query = session.query || trimmed; session.twoAgentReview=state.twoAgentReview; session.history.push({role:'user',content:trimmed}); session.messages.push({role:'user',content:trimmed,sources:[],meta:{}}); const assistantMessage={role:'assistant',content:'',sources:[],meta:{codeMode:false},review:emptyReview()}; session.messages.push(assistantMessage); state.currentAnswer=''; renderHistory(); showThread(session); setStatus('Checking'); saveSessions(); try{const response=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:trimmed,history:session.history,twoAgentReview:state.twoAgentReview}),signal:state.abortController.signal}); if(!response.ok||!response.body){let message='Request failed.'; try{const error=await response.json(); message=error.error||message;}catch{} throw new Error(message);} const reader=response.body.getReader(); const decoder=new TextDecoder(); let buffer=''; let finished=false; while(!finished){const {value,done}=await reader.read(); if(done) break; buffer+=decoder.decode(value,{stream:true}); const events=buffer.split('\n\n'); buffer=events.pop()||''; for(const rawEvent of events){const lines=rawEvent.split('\n').filter(Boolean); let eventName='message'; let dataLine=''; for(const line of lines){if(line.startsWith('event:')) eventName=line.slice(6).trim(); if(line.startsWith('data:')) dataLine+=line.slice(5).trim();} if(!dataLine) continue; const payload=JSON.parse(dataLine); if(eventName==='meta'){assistantMessage.meta=payload||{codeMode:false}; if(payload?.reviewMode){assistantMessage.review=assistantMessage.review||emptyReview(); assistantMessage.review.running=true; renderThread(); saveSessions();}} else if(eventName==='sources'){assistantMessage.sources=payload.sources||[]; renderThread(); saveSessions();} else if(eventName==='review'){assistantMessage.review=assistantMessage.review||emptyReview(); assistantMessage.review.running=true; assistantMessage.review.timeline=assistantMessage.review.timeline||[]; assistantMessage.review.timeline.push({round:payload.round||1,agent:payload.agent||'Agent',text:payload.text||''}); renderThread(); saveSessions();} else if(eventName==='chunk'){state.currentAnswer+=payload.content||''; assistantMessage.content=state.currentAnswer; renderThread(); setStatus('Replying'); saveSessions();} else if(eventName==='error'){throw new Error(payload.error||'Streaming error.');} else if(eventName==='done'){if(assistantMessage.review) assistantMessage.review.running=false; renderThread(); saveSessions(); finished=true; break;}}} session.history.push({role:'assistant',content:assistantMessage.content.trim()}); setStatus('Complete'); saveSessions(); } catch(error){ if(error.name==='AbortError'){setStatus('Canceled'); return;} assistantMessage.content=error.message||'Something went wrong.'; renderThread(); setStatus('Error'); } finally {state.abortController=null;} }
    function researchModeLabel(query){return /(today|latest|current|news|look up|search the web|verify|official docs|documentation|release notes|changelog|who won|weather|forecast|score|odds)/i.test(query)?'Checking':'Thinking';}
    function submitInput(input){if(!input) return; const value=input.value.trim(); if(!value) return; input.value=''; runResearch(value);}
    [homeInput,followupInput].filter(Boolean).forEach(input=>input.addEventListener('keydown',event=>{if(event.key==='Enter'){event.preventDefault(); submitInput(input);}}));
    ['click','pointerup','touchend'].forEach(evt=>homeSend&&homeSend.addEventListener(evt,(e)=>{e.preventDefault();submitInput(homeInput);})); ['click','pointerup','touchend'].forEach(evt=>followupSend.addEventListener(evt,(e)=>{e.preventDefault();submitInput(followupInput);})); threadBody.addEventListener('click',(e)=>{const btn=e.target.closest('[data-review-toggle]'); if(!btn) return; const session=getActiveSession(); const idx=Number(btn.dataset.reviewToggle); const msg=session?.messages?.[idx]; if(!msg||!msg.review) return; msg.review.open=!msg.review.open; renderThread();}); newChatBtn.addEventListener('click',()=>{const session=createSession(''); openSession(session.id); homeInput.focus(); closeSidebar(); closeArtifact();}); menuBtn.addEventListener('click',openSidebar); sidebarClose.addEventListener('click',closeSidebar); overlay.addEventListener('click',()=>{closeSidebar(); closeArtifact();}); artifactClose.addEventListener('click',closeArtifact);
    artifactCopy.addEventListener('click',async()=>{const file=state.artifactFiles[state.activeArtifactIndex]; if(!file)return; await copyText(file.content||''); const t=artifactCopy.textContent; artifactCopy.textContent='Copied ✓'; setTimeout(()=>artifactCopy.textContent=t,2000);}); artifactDownload.addEventListener('click',()=>{const file=state.artifactFiles[state.activeArtifactIndex]; if(!file)return; const blob=new Blob([file.content||''],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=file.name; a.click(); URL.revokeObjectURL(a.href);});
    document.querySelectorAll('.chip').forEach(chip=>chip.addEventListener('click',()=>{followupInput.value=chip.dataset.query||''; submitInput(followupInput);}));
    bindComposerMenu(homePlus,homeMenu); bindComposerMenu(followupPlus,followupMenu); document.addEventListener('click',(e)=>{if(e.target.closest('.composer-left')) return; closeComposerMenus();});
    loadSessions(); if(state.sessions.length){state.activeSessionId=state.sessions[0].id; openSession(state.activeSessionId);} else {setDebateEnabled(false); showHome(); renderHistory();}
  </script>

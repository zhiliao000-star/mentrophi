<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentrophi</title>
  <meta name="description" content="Mentrophi is a conversational AI assistant with lightweight background research when needed." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg: #0e0e10;
      --bg-soft: #161618;
      --sidebar: #111113;
      --panel: rgba(255,255,255,.03);
      --panel-strong: rgba(255,255,255,.05);
      --panel-elevated: rgba(18,18,20,.94);
      --border: rgba(255,255,255,.06);
      --border-soft: rgba(255,255,255,.04);
      --text: #e8e8ec;
      --text-soft: #c4c4cc;
      --muted: #7a7a86;
      --muted-2: #55555f;
      --accent: #6e8efb;
      --accent-soft: rgba(110,142,251,.12);
      --green: #5cc9a0;
      --danger: #e8657a;
      --shadow: 0 16px 48px rgba(0,0,0,.35);
      --radius-xl: 16px;
      --radius-lg: 14px;
      --radius-md: 12px;
      --radius-sm: 10px;
      --sidebar-width: 260px;
      --thread-width: 720px;
      --artifact-width: min(420px, 42vw);
      --codebg: #101012;
      --codehead: #141416;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
      background: var(--bg);
    }

    button, input, textarea { font: inherit; color: inherit; }
    button { background: transparent; border: 0; padding: 0; cursor: pointer; appearance: none; }
    input { outline: none; }
    a { color: inherit; text-decoration: none; }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0,1fr);
      min-height: 100vh;
      transition: grid-template-columns .28s ease;
    }
    .app.artifact-open { grid-template-columns: var(--sidebar-width) minmax(0,1fr) var(--artifact-width); }

    .overlay {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(10px);
      z-index:35;
    }
    .overlay.open { display:block; }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 20px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 40;
    }
    .sidebar-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 2px 2px 0;
    }
    .brand {
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display:grid;
      place-items:center;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
    }
    .brand-text {
      display:grid;
      gap:1px;
      min-width:0;
    }
    .brand-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .02em;
      color: var(--text);
    }
    .brand-subtitle {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .01em;
    }
    .sidebar-close {
      display:none;
      width:30px;
      height:30px;
      align-items:center;
      justify-content:center;
      border-radius:8px;
      border:1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      font-size: 14px;
      transition: background .15s ease, color .15s ease;
    }
    .sidebar-close:hover { background: var(--panel-strong); color: var(--text-soft); }

    .new-chat {
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:11px 13px;
      border-radius: var(--radius-md);
      color: var(--text-soft);
      background: var(--panel);
      border:1px solid var(--border);
      transition: background .15s ease, border-color .15s ease;
    }
    .new-chat-label { font-weight: 500; font-size: 14px; }
    .new-chat-plus {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      display:grid;
      place-items:center;
      background: var(--panel-strong);
      color: var(--muted);
      font-size: 14px;
    }
    .new-chat:hover {
      background: var(--panel-strong);
      border-color: rgba(255,255,255,.1);
    }

    .sidebar-section {
      display:grid;
      gap:8px;
      min-height:0;
      flex:1;
    }
    .history-title {
      display:flex;
      align-items:center;
      gap:8px;
      padding: 8px 4px 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted-2);
      border-top: 1px solid var(--border);
    }
    .history-list {
      display:grid;
      gap:4px;
      align-content:start;
      min-height:0;
      overflow:auto;
      padding-right: 2px;
    }
    .history-item {
      width:100%;
      text-align:left;
      padding:9px 11px;
      border-radius: var(--radius-sm);
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .15s ease, color .15s ease;
      font-size: 13px;
      line-height: 1.4;
    }
    .history-item:hover {
      color: var(--text-soft);
      background: var(--panel);
    }
    .history-item.active {
      color: var(--text);
      background: var(--panel-strong);
    }

    .main {
      min-width: 0;
      display:flex;
      flex-direction:column;
      position: relative;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 25;
      height: 52px;
      padding: 0 16px;
      display:grid;
      grid-template-columns: 36px minmax(0,1fr) 36px;
      align-items:center;
      border-bottom: 1px solid var(--border);
      background: rgba(14,14,16,.88);
    }
    .topbar-right { display:flex; align-items:center; justify-content:flex-end; }
    .menu-btn,
    .top-action {
      width: 32px;
      height: 32px;
      display:grid;
      place-items:center;
      border-radius:8px;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      transition: background .15s ease, color .15s ease;
    }
    .menu-btn:hover,
    .top-action:hover {
      background: var(--panel);
      color: var(--text-soft);
    }
    .menu-btn { display:none; }
    .menu-btn svg,.top-action svg,.send-btn svg,.icon-btn svg { width:18px; height:18px; }
    .top-query {
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      padding: 0 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }
    .status {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .sr-only {
      position:absolute !important;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    .main-stage {
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .content-wrap {
      flex:1;
      overflow:auto;
      padding: 0 18px 120px;
      scroll-behavior: smooth;
    }
    .article-shell { max-width: 1100px; margin: 0 auto; width: 100%; }
    .thread-shell { max-width: var(--thread-width); margin: 0 auto; width: 100%; }

    .home-state {
      min-height: calc(100svh - 52px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 120px;
    }
    .home-shell {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
      text-align: center;
    }
    .hero-mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display:grid;
      place-items:center;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 16px;
      font-weight: 500;
    }
    .hero-copy {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      max-width: 560px;
    }
    .hero-eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted-2);
    }
    .hero-title {
      margin: 0;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.1;
      letter-spacing: -.03em;
      font-weight: 600;
      max-width: 14ch;
      color: var(--text);
    }
    .hero-subtitle {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
      max-width: 38ch;
    }

    .home-composer-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .composer {
      width: 100%;
    }
    .composer-shell {
      position: relative;
      display:grid;
      grid-template-columns: auto minmax(0,1fr) auto;
      align-items:center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--bg-soft);
      transition: border-color .2s ease;
    }
    .composer-shell:focus-within {
      border-color: rgba(255,255,255,.12);
    }
    .composer-left {
      position: relative;
      display:flex;
      align-items:center;
    }
    .composer-input {
      width: 100%;
      min-width: 0;
      border: 0 !important;
      background: transparent !important;
      color: var(--text);
      font-size: 15px;
      padding: 8px 2px;
      -webkit-appearance:none;
      appearance:none;
    }
    .composer-input::placeholder { color: var(--muted); }
    .icon-btn {
      width: 32px;
      height: 32px;
      display:grid;
      place-items:center;
      border-radius: 8px;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      transition: background .15s ease, color .15s ease;
    }
    .icon-btn:hover {
      color: var(--text-soft);
      background: var(--panel);
    }
    .icon-btn.active {
      color: var(--text-soft);
      background: var(--panel-strong);
      border-color: var(--border);
    }
    .send-btn {
      width: 34px;
      height: 34px;
      display:grid;
      place-items:center;
      border-radius: 8px;
      color: var(--text);
      background: var(--accent);
      transition: opacity .15s ease;
    }
    .send-btn:hover { opacity: .85; }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; }

    .composer-menu {
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      min-width: 200px;
      padding: 6px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg-soft);
      box-shadow: var(--shadow);
      display: none;
      z-index: 50;
    }
    .composer-menu.open { display:block; }
    .composer-menu-item {
      width:100%;
      display:flex;
      align-items:center;
      gap: 10px;
      text-align:left;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      color: var(--text-soft);
      transition: background .15s ease;
    }
    .composer-menu-item:hover {
      background: var(--panel);
    }
    .composer-menu-item svg { width: 16px; height: 16px; flex: 0 0 auto; }
    .composer-menu-label { display:grid; gap:2px; }
    .composer-menu-title { font-size: 13px; font-weight: 500; }
    .composer-menu-meta { font-size: 11px; color: var(--muted); }

    .suggestion-row {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap: 8px;
    }
    .chip {
      flex:0 0 auto;
      max-width:100%;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      transition: background .15s ease, color .15s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
    }
    .chip:hover {
      background: var(--panel-strong);
      color: var(--text-soft);
    }
    .home-footnote {
      font-size: 11px;
      color: var(--muted-2);
    }

    .thread { display:none; }
    .thread.active { display:block; }
    .thread-body {
      padding-top: 34px;
      padding-bottom: 18px;
    }
    .message {
      margin: 0 0 34px;
    }
    .message.user {
      display:flex;
      justify-content:flex-end;
    }
    .message.assistant {
      display:block;
    }
    .message.user .message-body {
      max-width: min(65%, 400px);
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      background: var(--panel-strong);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .message.assistant .message-body {
      max-width: 100%;
      padding: 0;
    }
    .message-body {
      font-size: 15px;
      line-height: 1.75;
      overflow-wrap:anywhere;
    }
    .message-body h1,
    .message-body h2,
    .message-body h3,
    .message-body h4 {
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -.02em;
      margin: 1.2em 0 .6em;
    }
    .message-body h2 { font-size: 20px; }
    .message-body h1:first-child,
    .message-body h2:first-child,
    .message-body p:first-child { margin-top:0; }
    .message-body p,
    .message-body li {
      font-size: 15px;
      line-height: 1.75;
      margin: 0 0 14px;
      color: var(--text-soft);
    }
    .message-body ul,
    .message-body ol { padding-left: 1.2rem; }
    .message-body strong { color: var(--text); }
    .message-body sup a {
      color: var(--accent);
      text-decoration:none;
      font-size:.8em;
      vertical-align:super;
    }
    .message-body blockquote {
      margin: 1rem 0 1.4rem;
      padding-left: 1rem;
      border-left: 2px solid var(--border);
      color: var(--muted);
    }
    .message-body pre { display:none; }
    .message-body code { font-family:'JetBrains Mono','SF Mono','Fira Code',monospace; }
    .placeholder {
      color: var(--muted);
      padding: 30px 0;
    }

    .debate-inline { margin: 0 0 12px; }
    .debate-toggle {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:4px 0;
      font-size:12px;
      color:var(--muted);
      cursor:pointer;
      background:none;
      border:none;
    }
    .debate-toggle-text { position:relative; display:inline-block; }
    .debate-toggle.running .debate-toggle-text {
      background:linear-gradient(90deg, rgba(255,255,255,.35) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,.35) 100%);
      background-size:220% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:debateShimmer 1.2s linear infinite;
    }
    .debate-toggle-caret { font-size:11px; color:var(--muted); }
    @keyframes debateShimmer { 0% { background-position:120% 0; } 100% { background-position:-120% 0; } }

    .review-panel {
      margin: 0 0 18px;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(14px);
    }
    .review-body { padding: 14px 16px; display:grid; gap:10px; }
    .review-round { display:grid; gap:8px; padding:10px 0; }
    .review-round + .review-round { border-top:1px solid rgba(255,255,255,.06); }
    .review-round-meta {
      font-size:11px;
      color:var(--muted);
      letter-spacing:.05em;
      text-transform:uppercase;
    }
    .review-turn {
      display:grid;
      gap:4px;
      padding:10px 12px;
      border-radius:14px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.05);
    }
    .review-agent-name { font-size:12px; font-weight:600; color:var(--text); }
    .review-turn-message { font-size:12px; line-height:1.6; color:var(--muted); }

    .artifact-cards { display:grid; gap:12px; margin:16px 0 26px; }
    .artifact-card {
      border-radius:18px;
      padding:15px 16px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
    }
    .artifact-meta { display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .artifact-name { font-size:14px; font-weight:600; color:var(--text); }
    .artifact-open { color:#9fc0ff; font-size:13px; font-weight:500; }
    .artifact-subtle { color:var(--muted); font-size:12px; margin-top:4px; }

    .share-wrap { margin:12px 0 24px; }
    .share-btn,
    .toast-copy {
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(77,141,255,.28);
      color:#9fc0ff;
      padding:9px 12px;
      border-radius:999px;
      background:rgba(77,141,255,.08);
    }
    .share-btn[disabled] { opacity:.5; cursor:not-allowed; }
    .toast {
      position:fixed;
      right:20px;
      bottom:94px;
      padding:12px 14px;
      max-width:320px;
      display:none;
      z-index:60;
      border-radius:16px;
      background:rgba(10,10,12,.94);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
    }
    .toast.show { display:block; }

    .sources-inline { margin-top:20px; padding-top:0; }
    .sources-footnotes {
      display:grid;
      gap:8px;
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
      opacity:.96;
      padding:14px 16px;
      border-radius:18px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
    }
    .sources-footnotes a { text-decoration:none; border-bottom:1px solid transparent; }
    .sources-footnotes a:hover { border-color:currentColor; }
    .sources-footnotes .domain,
    .sources-footnotes .footnote-index { color:var(--muted); }

    .bottom-composer {
      display:none;
      position:fixed;
      left: var(--sidebar-width);
      right: 0;
      bottom: 0;
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(14,14,16,.96) 60%, rgba(14,14,16,0));
      z-index: 24;
    }
    .bottom-composer.visible { display:block; }
    .app.artifact-open .bottom-composer { right: var(--artifact-width); }
    .bottom-composer .composer { max-width: var(--thread-width); margin: 0 auto; padding: 0 12px; }
    .bottom-composer .composer-menu { top:auto; bottom:calc(100% + 8px); }

    .artifact-panel {
      position: relative;
      border-left:1px solid var(--border);
      background: var(--codebg);
      color:#e4e4e8;
      transform:translateX(100%);
      transition:transform .28s ease;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .app.artifact-open .artifact-panel { transform:translateX(0); }
    .artifact-header {
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:space-between;
      padding:12px 14px;
      background: var(--codehead);
      border-bottom:1px solid var(--border);
    }
    .artifact-left { display:flex; align-items:center; gap:10px; min-width:0; }
    .artifact-close,
    .artifact-tab,
    .artifact-action {
      border:1px solid var(--border);
      color: var(--text-soft);
      border-radius:8px;
      background: var(--panel);
    }
    .artifact-close {
      font-size:16px;
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
    }
    .artifact-tabs { display:flex; gap:6px; overflow:auto; }
    .artifact-tab { padding:6px 10px; white-space:nowrap; font-size: 13px; }
    .artifact-tab.active { background:var(--panel-strong); color:var(--text); }
    .artifact-actions { display:flex; gap:6px; }
    .artifact-action { padding:6px 10px; font-size: 13px; }
    .artifact-body { flex:1; overflow:auto; }
    .artifact-body pre { margin:0; padding:20px; }
    .artifact-body code { font-family:'JetBrains Mono','SF Mono','Fira Code',monospace; font-size:13px; line-height:1.6; }
    .artifact-markdown { font-size:14px; line-height:1.75; }
    .artifact-markdown p { margin:0 0 14px; }
    .artifact-markdown h1,
    .artifact-markdown h2,
    .artifact-markdown h3 { font-weight:600; line-height:1.2; margin:1.2em 0 .6em; }
    .artifact-markdown ul,
    .artifact-markdown ol { padding-left:1.2rem; }

    @media (max-width: 1100px) {
      .hero-title { font-size: clamp(32px, 6vw, 44px); }
      .message.user .message-body { max-width: min(72%, 380px); }
    }

    @media (max-width: 900px) {
      .app,
      .app.artifact-open { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: min(80vw, 280px);
        transform: translateX(-100%);
        transition: transform .22s ease;
        box-shadow: 8px 0 32px rgba(0,0,0,.3);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-close { display:inline-flex; }
      .menu-btn { display:grid; }
      .topbar { padding: 0 12px; height: 48px; }
      .content-wrap { padding: 0 14px 110px; }
      .article-shell { padding: 0; }
      .home-state { min-height: calc(100svh - 48px); padding: 12px 0 24px; }
      .home-shell { gap: 16px; }
      .hero-subtitle { font-size: 13px; }
      .bottom-composer {
        left: 0;
        right: 0;
        padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      }
      .app.artifact-open .bottom-composer { right: 0; }
      .bottom-composer .composer { padding: 0 10px; }
      .message.user .message-body { max-width:min(78%, 260px); }
      .toast { left:16px; right:16px; max-width:none; }
      .artifact-panel { position:fixed; inset:0; z-index:44; border-left:0; width:100%; }
    }

    @media (max-width: 640px) {
      .hero-mark { width: 40px; height: 40px; border-radius: 10px; }
      .hero-title { font-size: clamp(28px, 9vw, 38px); max-width: 10ch; }
      .hero-subtitle { max-width: 28ch; }
      .home-composer-wrap { gap: 12px; }
      .composer-shell { padding: 8px 10px; border-radius: var(--radius-md); }
      .chip { max-width: 100%; }
    }

    /* ====== GLOBAL THEME OVERRIDES ====== */
    :root {
      --bg: #0e0e10;
      --sidebar-bg: #111113;
      --text: #e8e8ec;
      --text-soft: #c4c4cc;
      --muted: #7a7a86;
      --muted-2: #55555f;
      --border: rgba(255,255,255,.06);
      --sidebar-width: 260px;
    }
    body { background: var(--bg); }
    .app, .app.artifact-open { grid-template-columns: 1fr; }

    /* ====== SIDEBAR ====== */
    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar-width);
      transform: translateX(-100%);
      transition: transform .22s ease;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      z-index: 50;
      box-shadow: 6px 0 24px rgba(0,0,0,.25);
    }
    .sidebar.open { transform: translateX(0); }

    .overlay.open {
      display: block;
      background: rgba(0,0,0,.35);
    }

    /* Sidebar header */
    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
    }
    .brand-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .01em;
      color: var(--text);
    }
    .brand-subtitle { display: none; }
    .sidebar-close {
      display: inline-flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      font-size: 14px;
      transition: background .15s ease, color .15s ease;
    }
    .sidebar-close:hover { background: var(--panel-strong); color: var(--text-soft); }

    /* New chat button */
    .new-chat {
      margin: 12px 12px 6px;
      width: calc(100% - 24px);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 500;
      transition: background .15s ease, border-color .15s ease;
    }
    .new-chat:hover {
      background: var(--panel-strong);
      border-color: rgba(255,255,255,.1);
    }
    .new-chat-label { flex: 1; text-align: left; }
    .new-chat-plus { color: var(--muted); opacity: .7; }
    .new-chat-plus svg { width: 16px; height: 16px; }

    /* History section */
    .sidebar-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 4px 12px 12px;
      overflow: hidden;
    }
    .history-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted-2);
      padding: 8px 4px 4px;
      border-top: 0;
      display: block;
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-right: 2px;
    }
    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 99px; }
    .history-item {
      width: 100%;
      text-align: left;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .15s ease, color .15s ease;
      line-height: 1.4;
    }
    .history-item:hover {
      background: var(--panel);
      color: var(--text-soft);
    }
    .history-item.active {
      background: var(--panel-strong);
      color: var(--text);
    }

    /* Topbar */
    .topbar {
      height: 48px;
      grid-template-columns: 36px 1fr 36px;
      border-bottom: 1px solid var(--border);
      background: rgba(14,14,16,.9);
      padding: 0 12px;
    }
    .menu-btn {
      display: grid;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      transition: background .15s ease, color .15s ease;
    }
    .menu-btn:hover { background: var(--panel); color: var(--text-soft); }
    .top-action {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      border-radius: 8px;
      width: 32px;
      height: 32px;
    }
    .top-action:hover { background: var(--panel); color: var(--text-soft); }
    .top-query {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .01em;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 900px) {
      .sidebar-close { display: none; }
      .content-wrap { padding: 0 0 150px; }
      .home-state { padding: 24px 14px 170px; }
    }
    @media (max-width: 640px) {
      .home-state { padding: 20px 12px 180px; }
      .home-shell { gap: 18px; }
    }

    .home-shell.deepseek-home {
      gap: 24px;
      padding: 0;
      width: 100%;
      max-width: 680px;
    }
    /* Brand eyebrow — subtle serif */
    .deepseek-home .hero-mark {
      background: transparent;
      border: 0;
      box-shadow: none;
      animation: none;
      width: auto;
      height: auto;
      font-size: 13px;
      line-height: 1.1;
      margin-bottom: 2px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-style: italic;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: .7;
    }
    .deepseek-home .hero-copy { gap: 8px; }
    .deepseek-home .hero-title {
      font-size: clamp(30px, 5vw, 44px);
      max-width: none;
      letter-spacing: -.025em;
      font-weight: 600;
      margin-top: 0;
      line-height: 1.1;
      color: var(--text);
    }
    .deepseek-home .hero-subtitle {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: .01em;
      white-space: normal;
    }
    .hero-eyebrow,
    .suggestion-row,
    .home-footnote {
      display: none;
    }

    .bottom-composer {
      left: 0;
      right: 0;
      bottom: 0;
      padding: 8px 12px calc(10px + env(safe-area-inset-bottom));
      display: block;
      background: linear-gradient(to top, rgba(14,14,16,1) 40%, rgba(14,14,16,.88) 65%, rgba(14,14,16,0));
      z-index: 30;
    }
    #bottomComposer { display: none; }
    #bottomComposer.visible { display: block; }

    .home-composer-wrap,
    .bottom-composer .composer {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 0;
    }
    .ds-composer-shell {
      display: block;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--bg-soft);
      padding: 10px 12px 8px;
      transition: border-color .2s ease;
    }
    .ds-composer-shell:focus-within {
      border-color: rgba(255,255,255,.12);
    }
    .ds-input {
      width: 100%;
      color: var(--text);
      font-size: 15px;
      padding: 6px 4px 10px;
      border: 0 !important;
      background: transparent !important;
    }
    .ds-input::placeholder { color: var(--muted); }
    .ds-controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-top: 2px;
    }
    .ds-mode-group,
    .ds-action-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #homePlus,
    #followupPlus {
      display: none !important;
    }
    .mode-chip {
      height: 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--panel);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: background .15s ease, color .15s ease, border-color .15s ease;
    }
    .mode-chip-active {
      background: var(--panel-strong);
      border-color: rgba(255,255,255,.1);
      color: var(--text-soft);
    }
    .mode-icon { display:inline-flex; width:14px; height:14px; line-height:1; }
    .mode-icon svg { width:14px; height:14px; }
    .debate-chip.active {
      background: var(--panel-strong);
      border-color: rgba(255,255,255,.1);
      color: var(--text-soft);
    }
    .ds-icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      padding: 0;
      transition: background .15s ease, color .15s ease;
    }
    .ds-icon-btn:hover { background: var(--panel); color: var(--text-soft); }
    .send-btn.ds-icon-btn {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }
    .send-btn.ds-icon-btn:hover { opacity: .85; }
    .ds-icon-btn svg { width: 18px; height: 18px; }

    .composer-menu {
      left: auto;
      right: 0;
      top: auto;
      bottom: calc(100% + 8px);
      min-width: 170px;
      border-radius: var(--radius-md);
      background: var(--bg-soft);
      border: 1px solid var(--border);
    }

    .thread-shell {
      max-width: var(--thread-width);
      padding: 0 12px;
    }
    .thread-body {
      padding-top: 8px;
    }
    .message { margin-bottom: 18px; }
    .message.user { justify-content: flex-end; }
    .message.user .message-body {
      max-width: min(60%, 360px);
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      color: var(--text);
      box-shadow: none;
      font-size: 15px;
      line-height: 1.6;
    }
    .message.assistant .message-body {
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.7;
    }
    .message-body p, .message-body li {
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.7;
    }

    .assistant-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
    }
    .assistant-actions .icon {
      display:inline-flex;
      width:16px;
      height:16px;
      opacity:.7;
    }
    .assistant-actions .icon svg { width:16px; height:16px; }
    .assistant-actions .spacer { flex: 1; }

    .artifact-panel { display: none; }
    .app.artifact-open .artifact-panel { display: none; }

    /* Review panel, debate, sources, artifacts - calm styling */
    .debate-toggle {
      font-size:11px;
      color:var(--muted);
    }
    .debate-toggle.running .debate-toggle-text {
      background: none;
      color: var(--muted);
      animation: none;
    }
    @keyframes debateShimmer { none; }

    .review-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: none;
    }
    .review-turn {
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .review-agent-name { color: var(--text-soft); }
    .review-turn-message { color: var(--muted); }

    .artifact-card {
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .artifact-name { color: var(--text-soft); }
    .artifact-open { color: var(--accent); }

    .share-btn,
    .toast-copy {
      border: 1px solid var(--border);
      color: var(--text-soft);
      background: var(--panel);
    }
    .toast {
      background: var(--bg-soft);
      border: 1px solid var(--border);
    }
    .sources-footnotes {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
    }

  </style>
</head>
<body>
  <div id="overlay" class="overlay"></div>
  <div id="app" class="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div class="brand-text">
            <div class="brand-title">Mentrophi</div>
            <div class="brand-subtitle">Quiet research. Clean chat.</div>
          </div>
        </div>
        <button id="sidebarClose" class="sidebar-close" aria-label="Close sidebar">✕</button>
      </div>

      <button id="newChatBtn" class="new-chat">
        <span class="new-chat-label">New chat</span>
        <span class="new-chat-plus" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </span>
      </button>

      <div class="sidebar-section">
        <div class="history-title"><span>Recents</span></div>
        <div id="historyList" class="history-list"></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="menuBtn" class="menu-btn" aria-label="Open sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M4 7h16M4 12h16M4 17h16"/>
          </svg>
        </button>
        <div id="topQuery" class="top-query">New chat</div>
        <div class="topbar-right">
          <div id="statusText" class="status sr-only">Idle</div>
          <button id="topNewChatBtn" class="top-action" aria-label="New chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="main-stage">
        <div class="content-wrap">
          <div class="article-shell">
            <section id="homeState" class="home-state">
              <div class="home-shell deepseek-home">
                <div class="hero-copy">
                  <h1 class="hero-title">How can I help you?</h1>
                  <p class="hero-subtitle">Ask anything — I'll search the web and think it through.</p>
                </div>

                <div class="home-composer-wrap">
                  <div class="composer home-composer">
                    <div class="composer-shell ds-composer-shell">
                      <input id="homeInput" class="composer-input ds-input" type="text" placeholder="Type a message or hold to speak" autocomplete="off" />
                      <div class="ds-controls-row">
                        <div class="ds-mode-group">
                          <button type="button" class="mode-chip debate-chip" data-debate-chip="true" data-mode="think">
                            <span class="mode-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.4"/></svg></span>
                            <span>Think</span>
                          </button>
                          <button type="button" class="mode-chip mode-chip-active" data-mode="search">
                            <span class="mode-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="8"/><path d="M4 12h16M12 4a14 14 0 0 1 0 16M12 4a14 14 0 0 0 0 16"/></svg></span>
                            <span>Search</span>
                          </button>
                        </div>
                        <div class="ds-action-group">
                          <button id="homePlus" type="button" class="icon-btn ds-icon-btn" aria-label="More options">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                          </button>
                          <button id="homeSend" type="button" class="send-btn ds-icon-btn" aria-label="Send">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.8 20.5 4.8 14 20l-2.8-6.2L3 11.8Z"/><path d="M20.5 4.8 11.2 13.8"/></svg>
                          </button>
                        </div>
                      </div>
                      <div id="homeMenu" class="composer-menu">
                        <button type="button" class="composer-menu-item" data-toggle-debate="true">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h7l2 3h7"></path><path d="M6 17h7l2-3h5"></path><circle cx="6" cy="7" r="2"></circle><circle cx="18" cy="17" r="2"></circle></svg>
                          <span class="composer-menu-label"><span class="composer-menu-title">Think Mode</span><span class="composer-menu-meta">Off</span></span>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section id="threadView" class="thread">
              <div class="thread-shell">
                <div id="threadBody" class="thread-body"></div>
              </div>
            </section>
          </div>
        </div>

        <div id="bottomComposer" class="bottom-composer">
          <div class="composer">
            <div class="composer-shell ds-composer-shell">
              <input id="followupInput" class="composer-input ds-input" type="text" placeholder="Type a message or hold to speak" autocomplete="off" />
              <div class="ds-controls-row">
                <div class="ds-mode-group">
                  <button type="button" class="mode-chip debate-chip" data-debate-chip="true" data-mode="think">
                    <span class="mode-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.4"/></svg></span>
                    <span>Think</span>
                  </button>
                  <button type="button" class="mode-chip mode-chip-active" data-mode="search">
                    <span class="mode-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="8"/><path d="M4 12h16M12 4a14 14 0 0 1 0 16M12 4a14 14 0 0 0 0 16"/></svg></span>
                    <span>Search</span>
                  </button>
                </div>
                <div class="ds-action-group">
                  <button id="followupPlus" type="button" class="icon-btn ds-icon-btn" aria-label="More options">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                  </button>
                  <button id="followupSend" type="button" class="send-btn ds-icon-btn" aria-label="Send">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.8 20.5 4.8 14 20l-2.8-6.2L3 11.8Z"/><path d="M20.5 4.8 11.2 13.8"/></svg>
                  </button>
                </div>
              </div>
              <div id="followupMenu" class="composer-menu">
                <button type="button" class="composer-menu-item" data-toggle-debate="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h7l2 3h7"></path><path d="M6 17h7l2-3h5"></path><circle cx="6" cy="7" r="2"></circle><circle cx="18" cy="17" r="2"></circle></svg>
                  <span class="composer-menu-label"><span class="composer-menu-title">Think Mode</span><span class="composer-menu-meta">Off</span></span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <aside id="artifactPanel" class="artifact-panel" aria-hidden="true">
      <div class="artifact-header">
        <div class="artifact-left">
          <button id="artifactClose" class="artifact-close" aria-label="Close artifact">✕</button>
          <div id="artifactTabs" class="artifact-tabs"></div>
        </div>
        <div class="artifact-actions">
          <button id="artifactCopy" class="artifact-action">Copy</button>
          <button id="artifactDownload" class="artifact-action">↓</button>
        </div>
      </div>
      <div class="artifact-body">
        <div id="artifactMarkdown" class="artifact-markdown" style="display:none;padding:22px;color:#f4f4f4"></div>
        <pre id="artifactPre"><code id="artifactCode"></code></pre>
      </div>
    </aside>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY='mentrophi-history-v2';
    const state={sessions:[],activeSessionId:null,currentAnswer:'',currentSources:[],abortController:null,currentMeta:{codeMode:false},artifactFiles:[],activeArtifactIndex:0,twoAgentReview:false,searchEnabled:true};
    const app=document.getElementById('app'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('overlay'),menuBtn=document.getElementById('menuBtn'),sidebarClose=document.getElementById('sidebarClose'),newChatBtn=document.getElementById('newChatBtn'),historyList=document.getElementById('historyList'),homeState=document.getElementById('homeState'),threadView=document.getElementById('threadView'),threadBody=document.getElementById('threadBody'),homeInput=document.getElementById('homeInput'),homeSend=document.getElementById('homeSend'),followupInput=document.getElementById('followupInput'),followupSend=document.getElementById('followupSend'),bottomComposer=document.getElementById('bottomComposer'),statusText=document.getElementById('statusText'),topQuery=document.getElementById('topQuery'),toast=document.getElementById('toast'),artifactPanel=document.getElementById('artifactPanel'),artifactTabs=document.getElementById('artifactTabs'),artifactCode=document.getElementById('artifactCode'),artifactMarkdown=document.getElementById('artifactMarkdown'),artifactPre=document.getElementById('artifactPre'),artifactClose=document.getElementById('artifactClose'),artifactCopy=document.getElementById('artifactCopy'),artifactDownload=document.getElementById('artifactDownload'),homePlus=document.getElementById('homePlus'),followupPlus=document.getElementById('followupPlus'),homeMenu=document.getElementById('homeMenu'),followupMenu=document.getElementById('followupMenu'),topNewChatBtn=document.getElementById('topNewChatBtn');
    const composerMenus=[homeMenu,followupMenu].filter(Boolean);
    marked.setOptions({breaks:true,gfm:true});

    function escapeHtml(text=''){return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;');}
    function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('open');}
    function openSidebar(){sidebar.classList.add('open');overlay.classList.add('open');}
    function openArtifact(index=0){state.activeArtifactIndex=index;app.classList.add('artifact-open');artifactPanel.setAttribute('aria-hidden','false');renderArtifactPanel();}
    function closeArtifact(){app.classList.remove('artifact-open');artifactPanel.setAttribute('aria-hidden','true');}
    function closeComposerMenus(){composerMenus.forEach(menu=>menu.classList.remove('open'));}
    function bindComposerMenu(button,menu){
      if(!button||!menu) return;
      button.addEventListener('click',(e)=>{
        e.stopPropagation();
        const isOpen=menu.classList.contains('open');
        closeComposerMenus();
        if(!isOpen) menu.classList.add('open');
      });
      menu.addEventListener('click',(e)=>{
        const item=e.target.closest('[data-toggle-debate]');
        if(!item) return;
        e.preventDefault();
        setDebateEnabled(!state.twoAgentReview);
        closeComposerMenus();
      });
    }

    function defaultSession(){return {id:crypto.randomUUID(),title:'New chat',query:'',history:[],messages:[],meta:{codeMode:false},twoAgentReview:state.twoAgentReview,searchEnabled:state.searchEnabled};}
    function migrateSessions(raw=[]){return raw.map(session=>({id:session.id||crypto.randomUUID(),title:session.title||session.query||'New chat',query:session.query||'',history:Array.isArray(session.history)?session.history:[],messages:Array.isArray(session.messages)?session.messages:(session.answer?[{role:'assistant',content:session.answer,sources:session.sources||[],meta:session.meta||{},review:emptyReview(),search:emptySearch()}]:[]),meta:session.meta||{codeMode:false},twoAgentReview:typeof session.twoAgentReview==='boolean'?session.twoAgentReview:false,searchEnabled:typeof session.searchEnabled==='boolean'?session.searchEnabled:true}));}
    function saveSessions(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.sessions));}
    function loadSessions(){try{state.sessions=migrateSessions(JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'));}catch{state.sessions=[];}}
    function createSession(initialQuery=''){
      const session=defaultSession();
      if(initialQuery){session.title=initialQuery.slice(0,42); session.query=initialQuery;}
      state.sessions.unshift(session);
      state.activeSessionId=session.id;
      saveSessions();
      renderHistory();
      return session;
    }
    function getActiveSession(){return state.sessions.find(session=>session.id===state.activeSessionId)||null;}
    function renderHistory(){
      historyList.innerHTML=state.sessions.map(session=>`<button class="history-item ${session.id===state.activeSessionId?'active':''}" data-id="${session.id}">${escapeHtml(session.title||'New chat')}</button>`).join('');
      historyList.querySelectorAll('.history-item').forEach(button=>button.addEventListener('click',()=>{openSession(button.dataset.id); closeSidebar(); closeComposerMenus();}));
    }
    function showToast(html){toast.innerHTML=html;toast.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>toast.classList.remove('show'),4000);}
    async function copyText(text){try{await navigator.clipboard.writeText(text);return true;}catch{return false;}}
    function inferExtension(lang=''){const map={js:'js',javascript:'js',ts:'ts',typescript:'ts',py:'py',python:'py',html:'html',css:'css',json:'json',sql:'sql',sh:'sh',bash:'sh',tsx:'tsx',jsx:'jsx'};return map[(lang||'').toLowerCase()]||'txt';}
    function languageLabel(lang=''){const map={js:'JavaScript',javascript:'JavaScript',ts:'TypeScript',typescript:'TypeScript',py:'Python',python:'Python',html:'HTML',css:'CSS',json:'JSON',sql:'SQL',sh:'Shell',bash:'Shell'};return map[(lang||'').toLowerCase()]||((lang||'Text').replace(/^./,c=>c.toUpperCase()));}
    function extractCodeBlocks(markdown=''){const blocks=[];const regex=/```([\w#+.-]*)\n([\s\S]*?)(```|$)/g;let match;let idx=1;while((match=regex.exec(markdown))){const language=(match[1]||'').toLowerCase();const content=(match[2]||'').trim();if(!content) continue;blocks.push({name:`app-${idx}.${inferExtension(language)}`,language,content,incomplete:match[3]!=='```',kind:'code'});idx+=1;}return blocks;}
    function extractWritingArtifact(markdown=''){const prose=(markdown||'').replace(/```[\w#+.-]*\n[\s\S]*?(?:```|$)/g,'').trim(); if(!prose) return []; const paragraphCount=prose.split(/\n\s*\n/).filter(Boolean).length; const looksStructured=/(^|\n)(#|##|###|[-*] |\d+\. )/m.test(prose); const substantial=prose.length>1400 || paragraphCount>=6 || (prose.length>900 && looksStructured); if(!substantial) return []; return [{name:'draft.md',language:'markdown',content:prose,incomplete:false,kind:'writing'}]; }
    function emptyReview(){return {open:false,running:false,timeline:[]};}
    function emptySearch(){return {enabled:false,open:false,running:false,sources:[]};}
    function renderSearchPanel(search,index){
      if(!search || !search.enabled) return '';
      const count=Array.isArray(search.sources)?search.sources.length:0;
      if(!search.running && !count) return '';
      const label=search.running?'Searching the web…':`View web search (${count} sources)`;
      const list=(search.sources||[]).map((source,sourceIndex)=>`<div class="review-turn"><div class="review-agent-name">Source ${sourceIndex+1}</div><div class="review-turn-message"><a href="${escapeHtml(source.url||'#')}" target="_blank" rel="noopener noreferrer">${escapeHtml(source.title||source.url||'Untitled source')}</a></div></div>`).join('');
      return `<div class="debate-inline"><button class="debate-toggle ${search.running?'running':''}" type="button" data-search-toggle="${index}"><span class="debate-toggle-text">${label}</span><span class="debate-toggle-caret">${search.open?'Hide':'Open'}</span></button>${search.open?`<div class="review-panel"><div class="review-body">${list||'<div class="review-turn-message">Searching…</div>'}</div></div>`:''}</div>`;
    }
    function renderReviewPanel(review,index){
      if(!review || (!review.running && (!Array.isArray(review.timeline) || !review.timeline.length))) return '';
      const turnCount=(review.timeline||[]).length;
      const rounds=[];
      const grouped=new Map();
      (review.timeline||[]).forEach(item=>{const key=String(item.round||1); if(!grouped.has(key)) grouped.set(key,[]); grouped.get(key).push(item);});
      grouped.forEach((items,key)=>{
        const body=items.map(item=>`<div class="review-turn"><div class="review-agent-name">${escapeHtml(item.agent)}</div><div class="review-turn-message">${escapeHtml(item.text||'')}</div></div>`).join('');
        rounds.push(`<section class="review-round"><div class="review-round-meta">Round ${escapeHtml(key)}</div>${body}</section>`);
      });
      const label=review.running?'Builder and Critic reviewing…':`View Builder/Critic debate (${turnCount} turns)`;
      return `<div class="debate-inline"><button class="debate-toggle ${review.running?'running':''}" type="button" data-review-toggle="${index}"><span class="debate-toggle-text">${label}</span><span class="debate-toggle-caret">${review.open?'Hide':'Open'}</span></button>${review.open?`<div class="review-panel"><div class="review-body">${rounds.join('')||'<div class="review-turn-message">Starting review…</div>'}</div></div>`:''}</div>`;
    }
    function renderArtifactPanel(){
      const files=state.artifactFiles||[];
      const active=files[state.activeArtifactIndex]||files[0];
      if(!active){artifactTabs.innerHTML='';artifactCode.textContent='';artifactMarkdown.innerHTML='';return;}
      artifactTabs.innerHTML=files.map((file,index)=>`<button class="artifact-tab ${index===state.activeArtifactIndex?'active':''}" data-index="${index}">${escapeHtml(file.kind==='writing'?'draft.md':file.name)}${file.incomplete?'…':''}</button>`).join('');
      artifactTabs.querySelectorAll('.artifact-tab').forEach(btn=>btn.addEventListener('click',()=>{state.activeArtifactIndex=Number(btn.dataset.index);renderArtifactPanel();}));
      if(active.kind==='writing'){
        artifactPre.style.display='none';
        artifactMarkdown.style.display='block';
        artifactMarkdown.innerHTML=marked.parse(active.content||'');
      } else {
        artifactMarkdown.style.display='none';
        artifactPre.style.display='block';
        artifactCode.className=active.language?`language-${active.language}`:'';
        artifactCode.textContent=active.content||'';
        if(window.hljs){window.hljs.highlightElement(artifactCode);}
      }
    }
    async function shareFiles(files, query=''){
      files=(files||[]).filter(file=>!file.incomplete);
      if(!files.length) return;
      const btn=document.querySelector('.share-btn');
      if(btn) btn.disabled=true;
      try{
        const res=await fetch('/api/snippet/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({files,query})});
        const data=await res.json();
        if(!res.ok) throw new Error(data.error||'Failed to share');
        showToast(`Shared! <a class="toast-copy" href="${data.url}" target="_blank">${data.url}</a>`);
        const link=toast.querySelector('.toast-copy');
        if(link) link.addEventListener('click',async(e)=>{e.preventDefault();await copyText(data.url);showToast('Link copied.');window.open(data.url,'_blank');},{once:true});
      }catch(error){showToast(escapeHtml(error.message));}
      finally{if(btn) btn.disabled=false;}
    }
    function renderMessageContent(message,index){
      const searchHtml=message.role==='assistant'?renderSearchPanel(message.search,index):'';
      const reviewHtml=message.role==='assistant'?renderReviewPanel(message.review,index):'';
      const codeFiles=extractCodeBlocks(message.content||'');
      const writingFiles=codeFiles.length?[]:extractWritingArtifact(message.content||'');
      const files=[...codeFiles,...writingFiles];
      const proseSource=(message.content||'').replace(/```[\w#+.-]*\n[\s\S]*?(?:```|$)/g,'').trim();
      let html=proseSource?marked.parse(proseSource):'';
      const superscriptDigits={'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
      html=html.replace(/\[(\d+)\]/g,(_,n)=>`<sup><a href="#source-${index+1}-${n}">${String(n).split('').map(d=>superscriptDigits[d]||d).join('')}</a></sup>`);
      if(writingFiles.length){
        const previewParas=proseSource.split(/\n\s*\n/).filter(Boolean).slice(0,2).join('\n\n');
        html=previewParas?marked.parse(previewParas):html;
      }
      let extra=searchHtml + reviewHtml;
      if(files.length){
        extra += `<div class="artifact-cards">${files.map((file,fileIndex)=>`<div class="artifact-card"><div class="artifact-meta"><div><div class="artifact-name">${escapeHtml(file.kind==='writing'?'Long-form draft':file.name)}</div><div class="artifact-subtle">${escapeHtml(file.kind==='writing'?'Open separately for reading or editing':languageLabel(file.language))}${file.incomplete?' · generating…':''}</div></div><button class="artifact-open" data-file-index="${fileIndex}" data-message-index="${index}">Open</button></div></div>`).join('')}</div>`;
        const shareableFiles=files.filter(file=>!file.incomplete && file.kind==='code');
        if(shareableFiles.length){extra += `<div class="share-wrap"><button class="share-btn" data-message-index="${index}">◆ Share this code</button></div>`;}
      }
      if(message.role==='assistant' && Array.isArray(message.sources) && message.sources.length){
        extra += `<section class="sources-inline"><div class="sources-footnotes">${message.sources.map((source,sourceIndex)=>{const n=sourceIndex+1; const sup=String(n).split('').map(d=>superscriptDigits[d]||d).join(''); const domain=source.domain||source.displayUrl||''; return `<div id="source-${index+1}-${n}"><span class="footnote-index">${sup}</span> <a href="${escapeHtml(source.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(source.title||'Untitled source')}</a> <span class="domain">— ${escapeHtml(domain)}</span></div>`;}).join('')}</div></section>`;
      }
      if(!html && files.length){html='<p>I put the code into an artifact so you can open it while it finishes generating.</p>';}
      else if(!html && message.role==='assistant' && Array.isArray(message.sources) && message.sources.length){html='<p>I found useful sources, but the answer stream came back incomplete. Try sending it once more and it should answer normally.</p>';}
      if(message.role==='assistant'){
        extra += '<div class="assistant-actions">'
          + '<span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="8" y="8" width="10" height="10" rx="2"/><rect x="5" y="5" width="10" height="10" rx="2"/></svg></span>'
          + '<span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11h3v9H7z"/><path d="M10 20h7a2 2 0 0 0 2-2v-5a2 2 0 0 0-2-2h-4l1-4-4 1.5z"/></svg></span>'
          + '<span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 13h3V4H7z"/><path d="M10 4h7a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-4l1 4-4-1.5z"/></svg></span>'
          + '<span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6v6h-6"/><path d="M4 18a8 8 0 0 0 13.7-5.7"/><path d="M4 18v-6h6"/><path d="M20 6A8 8 0 0 0 6.3 11.7"/></svg></span>'
          + '<span class="spacer"></span>'
          + '<span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5h5v5"/><path d="M10 14 19 5"/><path d="M19 14v5h-5"/><path d="M5 10V5h5"/><path d="M5 19h5v-5"/></svg></span>'
          + '</div>';
      }
      return html + extra;
    }
    function renderThread(){
      const session=getActiveSession();
      if(!session||!session.messages.length){threadBody.innerHTML='<div class="placeholder">Start a conversation.</div>'; return;}
      threadBody.innerHTML=session.messages.map((message,index)=>{
        const review=message.review||{};
        const turnCount=Array.isArray(review.timeline)?review.timeline.length:0;
        const attrs=message.role==='assistant'&&((review.running)||turnCount)?` data-debate-active="true" data-debate-turn-count="${turnCount}"`:'';
        return `<article class="message ${message.role}"${attrs}><div class="message-body">${renderMessageContent(message,index)}</div></article>`;
      }).join('');
      threadBody.querySelectorAll('.artifact-open').forEach(btn=>btn.addEventListener('click',()=>{
        const msg=session.messages[Number(btn.dataset.messageIndex)];
        const codeFiles=extractCodeBlocks(msg.content||'');
        const writingFiles=codeFiles.length?[]:extractWritingArtifact(msg.content||'');
        state.artifactFiles=[...codeFiles,...writingFiles];
        openArtifact(Number(btn.dataset.fileIndex));
      }));
      threadBody.querySelectorAll('.share-btn').forEach(btn=>btn.addEventListener('click',()=>{
        const msg=session.messages[Number(btn.dataset.messageIndex)];
        shareFiles(extractCodeBlocks(msg.content||''), session.query||session.title||'');
      }));
    }
    function setStatus(text){statusText.textContent=text;}
    function setDebateEnabled(enabled){
      state.twoAgentReview=!!enabled;
      document.querySelectorAll('[data-toggle-debate="true"]').forEach(item=>{
        const meta=item.querySelector('.composer-menu-meta');
        if(meta) meta.textContent=state.twoAgentReview?'On':'Off';
      });
      document.querySelectorAll('[data-debate-chip="true"]').forEach(item=>{
        item.classList.toggle('active', state.twoAgentReview);
      });
      syncModeChips();
      syncPlusButtons();
      persistComposerFlags();
    }
    function setSearchEnabled(enabled){
      state.searchEnabled=!!enabled;
      syncModeChips();
      persistComposerFlags();
    }
    function syncModeChips(){
      document.querySelectorAll('.ds-mode-group').forEach(group=>{
        const think=group.querySelector('[data-mode="think"]');
        const search=group.querySelector('[data-mode="search"]');
        if(think) think.classList.toggle('mode-chip-active', state.twoAgentReview);
        if(search) search.classList.toggle('mode-chip-active', state.searchEnabled);
      });
    }
    function syncPlusButtons(){[homePlus,followupPlus].forEach(btn=>btn&&btn.classList.toggle('active',state.twoAgentReview));}
    function persistComposerFlags(){const session=getActiveSession(); if(session){session.twoAgentReview=state.twoAgentReview; session.searchEnabled=state.searchEnabled; saveSessions();}}
    function showHome(){
      homeState.style.display='grid';
      threadView.classList.remove('active');
      topQuery.textContent='New chat';
      threadBody.innerHTML='';
      bottomComposer.classList.remove('visible');
      followupInput.value='';
      closeArtifact();
      setStatus('Idle');
    }
    function showThread(session){
      homeState.style.display='none';
      threadView.classList.add('active');
      topQuery.textContent=session.title||session.query||'Chat';
      renderThread();
      bottomComposer.classList.add('visible');
      followupInput.placeholder='Type a message or hold to speak';
      setStatus('Ready');
      requestAnimationFrame(()=>{threadBody.scrollTop=threadBody.scrollHeight;});
    }
    function openSession(sessionId){
      state.activeSessionId=sessionId;
      renderHistory();
      const session=getActiveSession();
      state.searchEnabled = typeof session?.searchEnabled==='boolean' ? session.searchEnabled : true;
      setDebateEnabled(!!session?.twoAgentReview);
      syncModeChips();
      if(!session||!session.messages.length) showHome();
      else showThread(session);
      saveSessions();
    }
    async function runResearch(query){
      const trimmed=query.trim();
      if(!trimmed) return;
      if(state.abortController) state.abortController.abort();
      state.abortController=new AbortController();
      closeComposerMenus();
      let session=getActiveSession();
      if(!session) session=createSession(trimmed);
      if(!session.messages.length && session.title==='New chat'){session.title=trimmed.slice(0,42); session.query=trimmed;}
      const effectiveQuery = state.searchEnabled ? `Search the web first, then answer:\n${trimmed}` : `${trimmed}\n\nAnswer directly without web search.`;
      session.query=session.query||trimmed;
      session.twoAgentReview=state.twoAgentReview;
      session.searchEnabled=state.searchEnabled;
      session.history.push({role:'user',content:trimmed});
      session.messages.push({role:'user',content:trimmed,sources:[],meta:{}});
      const assistantMessage={role:'assistant',content:'',sources:[],meta:{codeMode:false},review:emptyReview(),search:{enabled:state.searchEnabled,open:false,running:state.searchEnabled,sources:[]},reviewPending:false};
      session.messages.push(assistantMessage);
      state.currentAnswer='';
      renderHistory();
      showThread(session);
      setStatus('Checking');
      saveSessions();
      try{
        const response=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:effectiveQuery,history:session.history,twoAgentReview:state.twoAgentReview}),signal:state.abortController.signal});
        if(!response.ok||!response.body){
          let message='Request failed.';
          try{const error=await response.json(); message=error.error||message;}catch{}
          throw new Error(message);
        }
        const reader=response.body.getReader();
        const decoder=new TextDecoder();
        let buffer='';
        let finished=false;
        while(!finished){
          const {value,done}=await reader.read();
          if(done) break;
          buffer+=decoder.decode(value,{stream:true});
          const events=buffer.split('\n\n');
          buffer=events.pop()||'';
          for(const rawEvent of events){
            const lines=rawEvent.split('\n').filter(Boolean);
            let eventName='message';
            let dataLine='';
            for(const line of lines){
              if(line.startsWith('event:')) eventName=line.slice(6).trim();
              if(line.startsWith('data:')) dataLine+=line.slice(5).trim();
            }
            if(!dataLine) continue;
            const payload=JSON.parse(dataLine);
            if(eventName==='meta'){
              assistantMessage.meta=payload||{codeMode:false};
              if(payload?.reviewMode){
                assistantMessage.review=assistantMessage.review||emptyReview();
                if(assistantMessage.search?.running){
                  assistantMessage.reviewPending=true;
                } else {
                  assistantMessage.review.running=true;
                }
                renderThread();
                saveSessions();
              }
            } else if(eventName==='sources'){
              assistantMessage.sources=payload.sources||[];
              if(assistantMessage.search?.enabled){
                assistantMessage.search.sources=payload.sources||[];
                assistantMessage.search.running=false;
                if(assistantMessage.reviewPending){
                  assistantMessage.review.running=true;
                  assistantMessage.reviewPending=false;
                }
              }
              renderThread();
              saveSessions();
            } else if(eventName==='review'){
              assistantMessage.review=assistantMessage.review||emptyReview();
              if(!assistantMessage.search?.running){assistantMessage.review.running=true;}
              assistantMessage.review.timeline=assistantMessage.review.timeline||[];
              assistantMessage.review.timeline.push({round:payload.round||1,agent:payload.agent||'Agent',text:payload.text||''});
              renderThread();
              saveSessions();
            } else if(eventName==='chunk'){
              state.currentAnswer+=payload.content||'';
              assistantMessage.content=state.currentAnswer;
              renderThread();
              setStatus('Replying');
              saveSessions();
            } else if(eventName==='error'){
              throw new Error(payload.error||'Streaming error.');
            } else if(eventName==='done'){
              if(assistantMessage.review) assistantMessage.review.running=false;
              if(assistantMessage.search) assistantMessage.search.running=false;
              assistantMessage.reviewPending=false;
              renderThread();
              saveSessions();
              finished=true;
              break;
            }
          }
        }
        session.history.push({role:'assistant',content:assistantMessage.content.trim()});
        setStatus('Complete');
        saveSessions();
      } catch(error) {
        if(error.name==='AbortError'){setStatus('Canceled'); return;}
        assistantMessage.content=error.message||'Something went wrong.';
        if(assistantMessage.review) assistantMessage.review.running=false;
        if(assistantMessage.search) assistantMessage.search.running=false;
        renderThread();
        setStatus('Error');
      } finally {
        state.abortController=null;
      }
    }
    function submitInput(input){if(!input) return; const value=input.value.trim(); if(!value) return; input.value=''; runResearch(value);}

    [homeInput,followupInput].filter(Boolean).forEach(input=>input.addEventListener('keydown',event=>{if(event.key==='Enter'){event.preventDefault(); submitInput(input);}}));
    ['click','pointerup','touchend'].forEach(evt=>homeSend&&homeSend.addEventListener(evt,(e)=>{e.preventDefault();submitInput(homeInput);}));
    ['click','pointerup','touchend'].forEach(evt=>followupSend&&followupSend.addEventListener(evt,(e)=>{e.preventDefault();submitInput(followupInput);}));
    threadBody.addEventListener('click',(e)=>{
      const reviewBtn=e.target.closest('[data-review-toggle]');
      if(reviewBtn){
        const session=getActiveSession();
        const idx=Number(reviewBtn.dataset.reviewToggle);
        const msg=session?.messages?.[idx];
        if(!msg||!msg.review) return;
        msg.review.open=!msg.review.open;
        renderThread();
        return;
      }
      const searchBtn=e.target.closest('[data-search-toggle]');
      if(searchBtn){
        const session=getActiveSession();
        const idx=Number(searchBtn.dataset.searchToggle);
        const msg=session?.messages?.[idx];
        if(!msg||!msg.search) return;
        msg.search.open=!msg.search.open;
        renderThread();
      }
    });
    newChatBtn.addEventListener('click',()=>{const session=createSession(''); openSession(session.id); if(homeInput) homeInput.focus(); closeSidebar(); closeArtifact();});
    topNewChatBtn.addEventListener('click',()=>{const session=createSession(''); openSession(session.id); if(homeInput) homeInput.focus(); closeArtifact(); closeSidebar();});
    menuBtn.addEventListener('click',openSidebar);
    sidebarClose.addEventListener('click',closeSidebar);
    overlay.addEventListener('click',()=>{closeSidebar(); closeArtifact(); closeComposerMenus();});
    artifactClose.addEventListener('click',closeArtifact);
    artifactCopy.addEventListener('click',async()=>{const file=state.artifactFiles[state.activeArtifactIndex]; if(!file) return; await copyText(file.content||''); const t=artifactCopy.textContent; artifactCopy.textContent='Copied ✓'; setTimeout(()=>artifactCopy.textContent=t,2000);});
    artifactDownload.addEventListener('click',()=>{const file=state.artifactFiles[state.activeArtifactIndex]; if(!file) return; const blob=new Blob([file.content||''],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=file.name; a.click(); URL.revokeObjectURL(a.href);});
    document.querySelectorAll('.chip').forEach(chip=>chip.addEventListener('click',()=>{const target=homeState.style.display==='none'?followupInput:homeInput; target.value=chip.dataset.query||''; submitInput(target);}));
    document.querySelectorAll('.mode-chip').forEach(btn=>btn.addEventListener('click',()=>{
      if(btn.dataset.mode==='think') setDebateEnabled(!state.twoAgentReview);
      if(btn.dataset.mode==='search') setSearchEnabled(!state.searchEnabled);
    }));
    bindComposerMenu(homePlus,homeMenu);
    bindComposerMenu(followupPlus,followupMenu);
    document.addEventListener('click',(e)=>{if(e.target.closest('.composer-left')) return; closeComposerMenus();});

    loadSessions();
    if(state.sessions.length){state.activeSessionId=state.sessions[0].id; openSession(state.activeSessionId);} else {setSearchEnabled(true); setDebateEnabled(false); showHome(); renderHistory();}
  </script>
</body>
</html>

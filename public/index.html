<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentrophi</title>
  <meta name="description" content="Mentrophi is a conversational AI assistant with lightweight background research when needed." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg: #0a0b0d;
      --bg-soft: #101116;
      --sidebar: #0d0f13;
      --panel: rgba(255,255,255,.04);
      --panel-strong: rgba(255,255,255,.06);
      --panel-elevated: rgba(18,20,26,.92);
      --border: rgba(255,255,255,.08);
      --border-soft: rgba(255,255,255,.05);
      --text: #f5f7fb;
      --text-soft: #d6dbe7;
      --muted: #8d95a5;
      --muted-2: #697181;
      --accent: #4d8dff;
      --accent-soft: rgba(77,141,255,.16);
      --green: #6be3a8;
      --danger: #ff6b7c;
      --shadow: 0 22px 60px rgba(0,0,0,.4);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --sidebar-width: 264px;
      --thread-width: 880px;
      --artifact-width: min(420px, 42vw);
      --codebg: #0b0d11;
      --codehead: #10131a;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, rgba(77,141,255,.11), transparent 26%),
        linear-gradient(180deg, #0a0b0d 0%, #090a0c 100%);
    }

    button, input, textarea { font: inherit; color: inherit; }
    button { background: transparent; border: 0; padding: 0; cursor: pointer; appearance: none; }
    input { outline: none; }
    a { color: inherit; text-decoration: none; }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0,1fr);
      min-height: 100vh;
      transition: grid-template-columns .28s ease;
    }
    .app.artifact-open { grid-template-columns: var(--sidebar-width) minmax(0,1fr) var(--artifact-width); }

    .overlay {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(10px);
      z-index:35;
    }
    .overlay.open { display:block; }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border-right: 1px solid var(--border-soft);
      padding: 18px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      backdrop-filter: blur(18px);
      z-index: 40;
    }
    .sidebar-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 4px 2px 0;
    }
    .brand {
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .brand-mark {
      width: 26px;
      height: 26px;
      border-radius: 10px;
      display:grid;
      place-items:center;
      background: linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.08);
      color: #eef4ff;
      font-size: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    .brand-text {
      display:grid;
      gap:2px;
      min-width:0;
    }
    .brand-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--text);
    }
    .brand-subtitle {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .02em;
    }
    .sidebar-close {
      display:none;
      width:34px;
      height:34px;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text-soft);
    }

    .new-chat {
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:13px 14px;
      border-radius: 16px;
      color: var(--text);
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }
    .new-chat-label { font-weight: 600; }
    .new-chat-plus {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
    }
    .new-chat:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
    }

    .sidebar-section {
      display:grid;
      gap:10px;
      min-height:0;
      flex:1;
    }
    .history-title {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding: 10px 4px 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .16em;
      color: var(--muted-2);
      border-top: 1px solid rgba(255,255,255,.05);
    }
    .history-list {
      display:grid;
      gap:6px;
      align-content:start;
      min-height:0;
      overflow:auto;
      padding-right: 2px;
    }
    .history-item {
      width:100%;
      text-align:left;
      padding:11px 12px;
      border-radius: 14px;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .18s ease, border-color .18s ease, color .18s ease;
    }
    .history-item:hover,
    .history-item.active {
      color: var(--text);
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.08);
    }

    .main {
      min-width: 0;
      display:flex;
      flex-direction:column;
      position: relative;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 25;
      height: 58px;
      padding: 0 18px;
      display:grid;
      grid-template-columns: 40px minmax(0,1fr) 40px;
      align-items:center;
      border-bottom: 1px solid rgba(255,255,255,.04);
      background: rgba(10,11,13,.84);
      backdrop-filter: blur(16px);
    }
    .topbar-right { display:flex; align-items:center; justify-content:flex-end; }
    .menu-btn,
    .top-action {
      width: 34px;
      height: 34px;
      display:grid;
      place-items:center;
      border-radius:999px;
      color: var(--text-soft);
      background: rgba(255,255,255,.03);
      border: 1px solid transparent;
      transition: all .18s ease;
    }
    .menu-btn:hover,
    .top-action:hover {
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.08);
    }
    .menu-btn { display:none; }
    .menu-btn svg,.top-action svg,.send-btn svg,.icon-btn svg { width:18px; height:18px; }
    .top-query {
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-soft);
    }
    .status {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .sr-only {
      position:absolute !important;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    .main-stage {
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .content-wrap {
      flex:1;
      overflow:auto;
      padding: 0 18px 120px;
      scroll-behavior: smooth;
    }
    .article-shell { max-width: 1100px; margin: 0 auto; width: 100%; }
    .thread-shell { max-width: var(--thread-width); margin: 0 auto; width: 100%; }

    .home-state {
      min-height: calc(100svh - 58px);
      display:grid;
      place-items:center;
      padding: 22px 0 40px;
    }
    .home-shell {
      width: min(100%, 860px);
      display:grid;
      gap: 22px;
      justify-items:center;
      align-content:center;
      text-align:center;
    }
    .hero-mark {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display:grid;
      place-items:center;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.08);
      color: #edf3ff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      font-size: 18px;
      letter-spacing: .02em;
    }
    .hero-copy {
      display:grid;
      gap: 10px;
      justify-items:center;
      max-width: 700px;
    }
    .hero-eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--muted-2);
    }
    .hero-title {
      margin: 0;
      font-size: clamp(42px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: -.05em;
      font-weight: 700;
      max-width: 12ch;
    }
    .hero-subtitle {
      margin: 0;
      font-size: 15px;
      line-height: 1.65;
      color: var(--muted);
      max-width: 44ch;
    }

    .home-composer-wrap {
      width: min(100%, 760px);
      display:grid;
      gap: 16px;
    }

    .composer {
      width: 100%;
    }
    .composer-shell {
      position: relative;
      display:grid;
      grid-template-columns: auto minmax(0,1fr) auto;
      align-items:center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(20,22,28,.94), rgba(14,16,21,.94));
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .composer-left {
      position: relative;
      display:flex;
      align-items:center;
    }
    .composer-input {
      width: 100%;
      min-width: 0;
      border: 0 !important;
      background: transparent !important;
      color: var(--text);
      font-size: 15px;
      padding: 10px 2px;
      -webkit-appearance:none;
      appearance:none;
    }
    .composer-input::placeholder { color: #80889a; }
    .icon-btn {
      width: 34px;
      height: 34px;
      display:grid;
      place-items:center;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      transition: all .18s ease;
    }
    .icon-btn:hover {
      color: var(--text-soft);
      border-color: rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
    }
    .icon-btn.active {
      color: #dce8ff;
      border-color: rgba(77,141,255,.34);
      background: rgba(77,141,255,.13);
      box-shadow: inset 0 0 0 1px rgba(77,141,255,.08);
    }
    .send-btn {
      width: 38px;
      height: 38px;
      display:grid;
      place-items:center;
      border-radius: 999px;
      color: white;
      background: linear-gradient(180deg, #5b98ff, #3f7ff5);
      box-shadow: 0 10px 28px rgba(63,127,245,.34);
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }
    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(63,127,245,.42); }
    .send-btn:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }

    .composer-menu {
      position: absolute;
      left: 0;
      top: calc(100% + 12px);
      min-width: 220px;
      padding: 8px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(14,16,21,.97);
      box-shadow: var(--shadow);
      display: none;
      z-index: 50;
      backdrop-filter: blur(18px);
    }
    .composer-menu.open { display:block; }
    .composer-menu-item {
      width:100%;
      display:flex;
      align-items:center;
      gap: 12px;
      text-align:left;
      padding: 11px 12px;
      border-radius: 14px;
      color: var(--text-soft);
      transition: background .18s ease, color .18s ease;
    }
    .composer-menu-item:hover {
      background: rgba(255,255,255,.05);
      color: var(--text);
    }
    .composer-menu-item svg { width: 18px; height: 18px; flex: 0 0 auto; }
    .composer-menu-label { display:grid; gap:2px; }
    .composer-menu-title { font-size: 14px; font-weight: 600; }
    .composer-menu-meta { font-size: 12px; color: var(--muted); }

    .suggestion-row {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap: 10px;
    }
    .chip {
      flex:0 0 auto;
      max-width:100%;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color: var(--text-soft);
      transition: all .18s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chip:hover {
      background: rgba(255,255,255,.05);
      border-color: rgba(255,255,255,.14);
      color: var(--text);
      transform: translateY(-1px);
    }
    .home-footnote {
      font-size: 12px;
      color: var(--muted-2);
      letter-spacing: .02em;
    }

    .thread { display:none; }
    .thread.active { display:block; }
    .thread-body {
      padding-top: 34px;
      padding-bottom: 18px;
    }
    .message {
      margin: 0 0 34px;
    }
    .message.user {
      display:flex;
      justify-content:flex-end;
    }
    .message.assistant {
      display:block;
    }
    .message.user .message-body {
      max-width: min(70%, 420px);
      padding: 14px 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.08);
      color: #f7f9ff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }
    .message.assistant .message-body {
      max-width: 100%;
      padding: 0;
    }
    .message-body {
      font-size: 15px;
      line-height: 1.84;
      overflow-wrap:anywhere;
    }
    .message-body h1,
    .message-body h2,
    .message-body h3,
    .message-body h4 {
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -.03em;
      margin: 1.35em 0 .72em;
    }
    .message-body h2 { font-size: 23px; }
    .message-body h1:first-child,
    .message-body h2:first-child,
    .message-body p:first-child { margin-top:0; }
    .message-body p,
    .message-body li {
      font-size: 15px;
      line-height: 1.84;
      margin: 0 0 16px;
      color: var(--text-soft);
    }
    .message-body ul,
    .message-body ol { padding-left: 1.3rem; }
    .message-body strong { color: var(--text); }
    .message-body sup a {
      color: #8fb6ff;
      text-decoration:none;
      font-size:.8em;
      vertical-align:super;
    }
    .message-body blockquote {
      margin: 1rem 0 1.5rem;
      padding-left: 1rem;
      border-left: 2px solid rgba(77,141,255,.45);
      color: var(--muted);
    }
    .message-body pre { display:none; }
    .message-body code { font-family:'JetBrains Mono','SF Mono','Fira Code',monospace; }
    .placeholder {
      color: var(--muted);
      padding: 30px 0;
    }

    .debate-inline { margin: 0 0 12px; }
    .debate-toggle {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:4px 0;
      font-size:12px;
      color:var(--muted);
      cursor:pointer;
      background:none;
      border:none;
    }
    .debate-toggle-text { position:relative; display:inline-block; }
    .debate-toggle.running .debate-toggle-text {
      background:linear-gradient(90deg, rgba(255,255,255,.35) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,.35) 100%);
      background-size:220% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:debateShimmer 1.2s linear infinite;
    }
    .debate-toggle-caret { font-size:11px; color:var(--muted); }
    @keyframes debateShimmer { 0% { background-position:120% 0; } 100% { background-position:-120% 0; } }

    .review-panel {
      margin: 0 0 18px;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(14px);
    }
    .review-body { padding: 14px 16px; display:grid; gap:10px; }
    .review-round { display:grid; gap:8px; padding:10px 0; }
    .review-round + .review-round { border-top:1px solid rgba(255,255,255,.06); }
    .review-round-meta {
      font-size:11px;
      color:var(--muted);
      letter-spacing:.05em;
      text-transform:uppercase;
    }
    .review-turn {
      display:grid;
      gap:4px;
      padding:10px 12px;
      border-radius:14px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.05);
    }
    .review-agent-name { font-size:12px; font-weight:600; color:var(--text); }
    .review-turn-message { font-size:12px; line-height:1.6; color:var(--muted); }

    .artifact-cards { display:grid; gap:12px; margin:16px 0 26px; }
    .artifact-card {
      border-radius:18px;
      padding:15px 16px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
    }
    .artifact-meta { display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .artifact-name { font-size:14px; font-weight:600; color:var(--text); }
    .artifact-open { color:#9fc0ff; font-size:13px; font-weight:500; }
    .artifact-subtle { color:var(--muted); font-size:12px; margin-top:4px; }

    .share-wrap { margin:12px 0 24px; }
    .share-btn,
    .toast-copy {
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(77,141,255,.28);
      color:#9fc0ff;
      padding:9px 12px;
      border-radius:999px;
      background:rgba(77,141,255,.08);
    }
    .share-btn[disabled] { opacity:.5; cursor:not-allowed; }
    .toast {
      position:fixed;
      right:20px;
      bottom:94px;
      padding:12px 14px;
      max-width:320px;
      display:none;
      z-index:60;
      border-radius:16px;
      background:rgba(10,10,12,.94);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
    }
    .toast.show { display:block; }

    .sources-inline { margin-top:20px; padding-top:0; }
    .sources-footnotes {
      display:grid;
      gap:8px;
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
      opacity:.96;
      padding:14px 16px;
      border-radius:18px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
    }
    .sources-footnotes a { text-decoration:none; border-bottom:1px solid transparent; }
    .sources-footnotes a:hover { border-color:currentColor; }
    .sources-footnotes .domain,
    .sources-footnotes .footnote-index { color:var(--muted); }

    .bottom-composer {
      display:none;
      position:fixed;
      left: var(--sidebar-width);
      right: 0;
      bottom: 0;
      padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(10,11,13,.95) 62%, rgba(10,11,13,0));
      backdrop-filter: blur(12px);
      transition: right .28s ease;
      z-index: 24;
    }
    .bottom-composer.visible { display:block; }
    .app.artifact-open .bottom-composer { right: var(--artifact-width); }
    .bottom-composer .composer { max-width: var(--thread-width); margin: 0 auto; padding: 0 12px; }
    .bottom-composer .composer-menu { top:auto; bottom:calc(100% + 12px); }

    .artifact-panel {
      position: relative;
      border-left:1px solid rgba(255,255,255,.08);
      background: var(--codebg);
      color:#f4f4f4;
      transform:translateX(100%);
      transition:transform .28s ease;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      box-shadow:-20px 0 40px rgba(0,0,0,.36);
    }
    .app.artifact-open .artifact-panel { transform:translateX(0); }
    .artifact-header {
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:space-between;
      padding:14px 16px;
      background: var(--codehead);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .artifact-left { display:flex; align-items:center; gap:10px; min-width:0; }
    .artifact-close,
    .artifact-tab,
    .artifact-action {
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      border-radius:10px;
      background: rgba(255,255,255,.04);

    async function copyText(text){try{await navigator.clipboard.writeText(text);return true;}catch{return false;}}
    function inferExtension(lang=''){const map={js:'js',javascript:'js',ts:'ts',typescript:'ts',py:'py',python:'py',html:'html',css:'css',json:'json',sql:'sql',sh:'sh',bash:'sh',tsx:'tsx',jsx:'jsx'};return map[(lang||'').toLowerCase()]||'txt';}
    function languageLabel(lang=''){const map={js:'JavaScript',javascript:'JavaScript',ts:'TypeScript',typescript:'TypeScript',py:'Python',python:'Python',html:'HTML',css:'CSS',json:'JSON',sql:'SQL',sh:'Shell',bash:'Shell'};return map[(lang||'').toLowerCase()]||((lang||'Text').replace(/^./,c=>c.toUpperCase()));}
    function extractCodeBlocks(markdown=''){const blocks=[];const regex=/```([\w#+.-]*)\n([\s\S]*?)(```|$)/g;let match;let idx=1;while((match=regex.exec(markdown))){const language=(match[1]||'').toLowerCase();const content=(match[2]||'').trim();if(!content) continue;blocks.push({name:`app-${idx}.${inferExtension(language)}`,language,content,incomplete:match[3]!=='```',kind:'code'});idx+=1;}return blocks;}
    function extractWritingArtifact(markdown=''){const prose=(markdown||'').replace(/```[\w#+.-]*\n[\s\S]*?(?:```|$)/g,'').trim(); if(!prose) return []; const paragraphCount=prose.split(/\n\s*\n/).filter(Boolean).length; const looksStructured=/(^|\n)(#|##|###|[-*] |\d+\. )/m.test(prose); const substantial=prose.length>1400 || paragraphCount>=6 || (prose.length>900 && looksStructured); if(!substantial) return []; return [{name:'draft.md',language:'markdown',content:prose,incomplete:false,kind:'writing'}]; }
    function emptyReview(){return {open:false,running:false,timeline:[]};}
    function renderReviewPanel(review,index){
      if(!review || (!review.running && (!Array.isArray(review.timeline) || !review.timeline.length))) return '';
      const turnCount=(review.timeline||[]).length;
      const rounds=[];
      const grouped=new Map();
      (review.timeline||[]).forEach(item=>{const key=String(item.round||1); if(!grouped.has(key)) grouped.set(key,[]); grouped.get(key).push(item);});
      grouped.forEach((items,key)=>{
        const body=items.map(item=>`<div class="review-turn"><div class="review-agent-name">${escapeHtml(item.agent)}</div><div class="review-turn-message">${escapeHtml(item.text||'')}</div></div>`).join('');
        rounds.push(`<section class="review-round"><div class="review-round-meta">Round ${escapeHtml(key)}</div>${body}</section>`);
      });
      const label=review.running?'Builder and Critic reviewing…':`View Builder/Critic debate (${turnCount} turns)`;
      return `<div class="debate-inline"><button class="debate-toggle ${review.running?'running':''}" type="button" data-review-toggle="${index}"><span class="debate-toggle-text">${label}</span><span class="debate-toggle-caret">${review.open?'Hide':'Open'}</span></button>${review.open?`<div class="review-panel"><div class="review-body">${rounds.join('')||'<div class="review-turn-message">Starting review…</div>'}</div></div>`:''}</div>`;
    }
    function renderArtifactPanel(){
      const files=state.artifactFiles||[];
      const active=files[state.activeArtifactIndex]||files[0];
      if(!active){artifactTabs.innerHTML='';artifactCode.textContent='';artifactMarkdown.innerHTML='';return;}
      artifactTabs.innerHTML=files.map((file,index)=>`<button class="artifact-tab ${index===state.activeArtifactIndex?'active':''}" data-index="${index}">${escapeHtml(file.kind==='writing'?'draft.md':file.name)}${file.incomplete?'…':''}</button>`).join('');
      artifactTabs.querySelectorAll('.artifact-tab').forEach(btn=>btn.addEventListener('click',()=>{state.activeArtifactIndex=Number(btn.dataset.index);renderArtifactPanel();}));
      if(active.kind==='writing'){
        artifactPre.style.display='none';
        artifactMarkdown.style.display='block';
        artifactMarkdown.innerHTML=marked.parse(active.content||'');
      } else {
        artifactMarkdown.style.display='none';
        artifactPre.style.display='block';
        artifactCode.className=active.language?`language-${active.language}`:'';
        artifactCode.textContent=active.content||'';
        if(window.hljs){window.hljs.highlightElement(artifactCode);}
      }
    }
    async function shareFiles(files, query=''){
      files=(files||[]).filter(file=>!file.incomplete);
      if(!files.length) return;
      const btn=document.querySelector('.share-btn');
      if(btn) btn.disabled=true;
      try{
        const res=await fetch('/api/snippet/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({files,query})});
        const data=await res.json();
        if(!res.ok) throw new Error(data.error||'Failed to share');
        showToast(`Shared! <a class="toast-copy" href="${data.url}" target="_blank">${data.url}</a>`);
        const link=toast.querySelector('.toast-copy');
        if(link) link.addEventListener('click',async(e)=>{e.preventDefault();await copyText(data.url);showToast('Link copied.');window.open(data.url,'_blank');},{once:true});
      }catch(error){showToast(escapeHtml(error.message));}
      finally{if(btn) btn.disabled=false;}
    }
    function renderMessageContent(message,index){
      const reviewHtml=message.role==='assistant'?renderReviewPanel(message.review,index):'';
      const codeFiles=extractCodeBlocks(message.content||'');
      const writingFiles=codeFiles.length?[]:extractWritingArtifact(message.content||'');
      const files=[...codeFiles,...writingFiles];
      const proseSource=(message.content||'').replace(/```[\w#+.-]*\n[\s\S]*?(?:```|$)/g,'').trim();
      let html=proseSource?marked.parse(proseSource):'';
      const superscriptDigits={'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
      html=html.replace(/\[(\d+)\]/g,(_,n)=>`<sup><a href="#source-${index+1}-${n}">${String(n).split('').map(d=>superscriptDigits[d]||d).join('')}</a></sup>`);
      if(writingFiles.length){
        const previewParas=proseSource.split(/\n\s*\n/).filter(Boolean).slice(0,2).join('\n\n');
        html=previewParas?marked.parse(previewParas):html;
      }
      let extra=reviewHtml;
      if(files.length){
        extra += `<div class="artifact-cards">${files.map((file,fileIndex)=>`<div class="artifact-card"><div class="artifact-meta"><div><div class="artifact-name">${escapeHtml(file.kind==='writing'?'Long-form draft':file.name)}</div><div class="artifact-subtle">${escapeHtml(file.kind==='writing'?'Open separately for reading or editing':languageLabel(file.language))}${file.incomplete?' · generating…':''}</div></div><button class="artifact-open" data-file-index="${fileIndex}" data-message-index="${index}">Open</button></div></div>`).join('')}</div>`;
        const shareableFiles=files.filter(file=>!file.incomplete && file.kind==='code');
        if(shareableFiles.length){extra += `<div class="share-wrap"><button class="share-btn" data-message-index="${index}">◆ Share this code</button></div>`;}
      }
      if(message.role==='assistant' && Array.isArray(message.sources) && message.sources.length){
        extra += `<section class="sources-inline"><div class="sources-footnotes">${message.sources.map((source,sourceIndex)=>{const n=sourceIndex+1; const sup=String(n).split('').map(d=>superscriptDigits[d]||d).join(''); const domain=source.domain||source.displayUrl||''; return `<div id="source-${index+1}-${n}"><span class="footnote-index">${sup}</span> <a href="${escapeHtml(source.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(source.title||'Untitled source')}</a> <span class="domain">— ${escapeHtml(domain)}</span></div>`;}).join('')}</div></section>`;
      }
      if(!html && files.length){html='<p>I put the code into an artifact so you can open it while it finishes generating.</p>';}
      else if(!html && message.role==='assistant' && Array.isArray(message.sources) && message.sources.length){html='<p>I found useful sources, but the answer stream came back incomplete. Try sending it once more and it should answer normally.</p>';}
      if(message.role==='assistant'){
        extra += '<div class="assistant-actions"><span>⧉</span><span>👍</span><span>👎</span><span>↻</span><span class="spacer"></span><span>↗</span></div>';
      }
      return html + extra;
    }
    function renderThread(){
      const session=getActiveSession();
      if(!session||!session.messages.length){threadBody.innerHTML='<div class="placeholder">Start a conversation.</div>'; return;}
      threadBody.innerHTML=session.messages.map((message,index)=>{
        const review=message.review||{};
        const turnCount=Array.isArray(review.timeline)?review.timeline.length:0;
        const attrs=message.role==='assistant'&&((review.running)||turnCount)?` data-debate-active="true" data-debate-turn-count="${turnCount}"`:'';
        return `<article class="message ${message.role}"${attrs}><div class="message-body">${renderMessageContent(message,index)}</div></article>`;
      }).join('');
      threadBody.querySelectorAll('.artifact-open').forEach(btn=>btn.addEventListener('click',()=>{
        const msg=session.messages[Number(btn.dataset.messageIndex)];
        const codeFiles=extractCodeBlocks(msg.content||'');
        const writingFiles=codeFiles.length?[]:extractWritingArtifact(msg.content||'');
        state.artifactFiles=[...codeFiles,...writingFiles];
        openArtifact(Number(btn.dataset.fileIndex));
      }));
      threadBody.querySelectorAll('.share-btn').forEach(btn=>btn.addEventListener('click',()=>{
        const msg=session.messages[Number(btn.dataset.messageIndex)];
        shareFiles(extractCodeBlocks(msg.content||''), session.query||session.title||'');
      }));
    }
    function setStatus(text){statusText.textContent=text;}
    function setDebateEnabled(enabled){
      state.twoAgentReview=!!enabled;
      document.querySelectorAll('[data-toggle-debate="true"]').forEach(item=>{
        const meta=item.querySelector('.composer-menu-meta');
        if(meta) meta.textContent=state.twoAgentReview?'On':'Off';
      });
      document.querySelectorAll('[data-debate-chip="true"]').forEach(item=>{
        item.classList.toggle('active', state.twoAgentReview);
      });
      syncPlusButtons();
      persistComposerFlags();
    }
    function syncPlusButtons(){[homePlus,followupPlus].forEach(btn=>btn&&btn.classList.toggle('active',state.twoAgentReview));}
    function persistComposerFlags(){const session=getActiveSession(); if(session){session.twoAgentReview=state.twoAgentReview; saveSessions();}}
    function showHome(){
      homeState.style.display='grid';
      threadView.classList.remove('active');
      topQuery.textContent='New chat';
      threadBody.innerHTML='';
      bottomComposer.classList.remove('visible');
      followupInput.value='';
      closeArtifact();
      setStatus('Idle');
    }
    function showThread(session){
      homeState.style.display='none';
      threadView.classList.add('active');
      topQuery.textContent=session.title||session.query||'Chat';
      renderThread();
      bottomComposer.classList.add('visible');
      followupInput.placeholder='Type a message or hold to speak';
      setStatus('Ready');
      requestAnimationFrame(()=>{threadBody.scrollTop=threadBody.scrollHeight;});
    }
    function openSession(sessionId){
      state.activeSessionId=sessionId;
      renderHistory();
      const session=getActiveSession();
      setDebateEnabled(!!session?.twoAgentReview);
      if(!session||!session.messages.length) showHome();
      else showThread(session);
      saveSessions();
    }
    async function runResearch(query){
      const trimmed=query.trim();
      if(!trimmed) return;
      if(state.abortController) state.abortController.abort();
      state.abortController=new AbortController();
      closeComposerMenus();
      let session=getActiveSession();
      if(!session) session=createSession(trimmed);
      if(!session.messages.length && session.title==='New chat'){session.title=trimmed.slice(0,42); session.query=trimmed;}
      session.query=session.query||trimmed;
      session.twoAgentReview=state.twoAgentReview;
      session.history.push({role:'user',content:trimmed});
      session.messages.push({role:'user',content:trimmed,sources:[],meta:{}});
      const assistantMessage={role:'assistant',content:'',sources:[],meta:{codeMode:false},review:emptyReview()};
      session.messages.push(assistantMessage);
      state.currentAnswer='';
      renderHistory();
      showThread(session);
      setStatus('Checking');
      saveSessions();
      try{
        const response=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:trimmed,history:session.history,twoAgentReview:state.twoAgentReview}),signal:state.abortController.signal});
        if(!response.ok||!response.body){
          let message='Request failed.';
          try{const error=await response.json(); message=error.error||message;}catch{}
          throw new Error(message);
        }
        const reader=response.body.getReader();
        const decoder=new TextDecoder();
        let buffer='';
        let finished=false;
        while(!finished){
          const {value,done}=await reader.read();
          if(done) break;
          buffer+=decoder.decode(value,{stream:true});
          const events=buffer.split('\n\n');
          buffer=events.pop()||'';
          for(const rawEvent of events){
            const lines=rawEvent.split('\n').filter(Boolean);
            let eventName='message';
            let dataLine='';
            for(const line of lines){
              if(line.startsWith('event:')) eventName=line.slice(6).trim();
              if(line.startsWith('data:')) dataLine+=line.slice(5).trim();
            }
            if(!dataLine) continue;
            const payload=JSON.parse(dataLine);
            if(eventName==='meta'){
              assistantMessage.meta=payload||{codeMode:false};
              if(payload?.reviewMode){assistantMessage.review=assistantMessage.review||emptyReview(); assistantMessage.review.running=true; renderThread(); saveSessions();}
            } else if(eventName==='sources'){
              assistantMessage.sources=payload.sources||[]; renderThread(); saveSessions();
            } else if(eventName==='review'){
              assistantMessage.review=assistantMessage.review||emptyReview();
              assistantMessage.review.running=true;
              assistantMessage.review.timeline=assistantMessage.review.timeline||[];
              assistantMessage.review.timeline.push({round:payload.round||1,agent:payload.agent||'Agent',text:payload.text||''});
              renderThread();
              saveSessions();
            } else if(eventName==='chunk'){
              state.currentAnswer+=payload.content||'';
              assistantMessage.content=state.currentAnswer;
              renderThread();
              setStatus('Replying');
              saveSessions();
            } else if(eventName==='error'){
              throw new Error(payload.error||'Streaming error.');
            } else if(eventName==='done'){
              if(assistantMessage.review) assistantMessage.review.running=false;
              renderThread();
              saveSessions();
              finished=true;
              break;
            }
          }
        }
        session.history.push({role:'assistant',content:assistantMessage.content.trim()});
        setStatus('Complete');
        saveSessions();
      } catch(error) {
        if(error.name==='AbortError'){setStatus('Canceled'); return;}
        assistantMessage.content=error.message||'Something went wrong.';
        if(assistantMessage.review) assistantMessage.review.running=false;
        renderThread();
        setStatus('Error');
      } finally {
        state.abortController=null;
      }
    }
    function submitInput(input){if(!input) return; const value=input.value.trim(); if(!value) return; input.value=''; runResearch(value);}

    [homeInput,followupInput].filter(Boolean).forEach(input=>input.addEventListener('keydown',event=>{if(event.key==='Enter'){event.preventDefault(); submitInput(input);}}));
    ['click','pointerup','touchend'].forEach(evt=>homeSend&&homeSend.addEventListener(evt,(e)=>{e.preventDefault();submitInput(homeInput);}));
    ['click','pointerup','touchend'].forEach(evt=>followupSend&&followupSend.addEventListener(evt,(e)=>{e.preventDefault();submitInput(followupInput);}));
    threadBody.addEventListener('click',(e)=>{
      const btn=e.target.closest('[data-review-toggle]');
      if(!btn) return;
      const session=getActiveSession();
      const idx=Number(btn.dataset.reviewToggle);
      const msg=session?.messages?.[idx];
      if(!msg||!msg.review) return;
      msg.review.open=!msg.review.open;
      renderThread();
    });
    newChatBtn.addEventListener('click',()=>{const session=createSession(''); openSession(session.id); if(homeInput) homeInput.focus(); closeSidebar(); closeArtifact();});
    topNewChatBtn.addEventListener('click',()=>{const session=createSession(''); openSession(session.id); if(homeInput) homeInput.focus(); closeArtifact(); closeSidebar();});
    menuBtn.addEventListener('click',openSidebar);
    sidebarClose.addEventListener('click',closeSidebar);
    overlay.addEventListener('click',()=>{closeSidebar(); closeArtifact(); closeComposerMenus();});
    artifactClose.addEventListener('click',closeArtifact);
    artifactCopy.addEventListener('click',async()=>{const file=state.artifactFiles[state.activeArtifactIndex]; if(!file) return; await copyText(file.content||''); const t=artifactCopy.textContent; artifactCopy.textContent='Copied ✓'; setTimeout(()=>artifactCopy.textContent=t,2000);});
    artifactDownload.addEventListener('click',()=>{const file=state.artifactFiles[state.activeArtifactIndex]; if(!file) return; const blob=new Blob([file.content||''],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=file.name; a.click(); URL.revokeObjectURL(a.href);});
    document.querySelectorAll('.chip').forEach(chip=>chip.addEventListener('click',()=>{const target=homeState.style.display==='none'?followupInput:homeInput; target.value=chip.dataset.query||''; submitInput(target);}));
    document.querySelectorAll('[data-debate-chip="true"]').forEach(btn=>btn.addEventListener('click',()=>{setDebateEnabled(!state.twoAgentReview);}));
    bindComposerMenu(homePlus,homeMenu);
    bindComposerMenu(followupPlus,followupMenu);
    document.addEventListener('click',(e)=>{if(e.target.closest('.composer-left')) return; closeComposerMenus();});

    loadSessions();
    if(state.sessions.length){state.activeSessionId=state.sessions[0].id; openSession(state.activeSessionId);} else {setDebateEnabled(false); showHome(); renderHistory();}
  </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />

  <style>
    :root { --bg:#f7f7f5; --sidebar:#efefe9; --surface:#ffffff; --text:#222222; --accent:#d46b4d; --border:#e2e0d8; --muted:#6f6a63; --codebg:#1f1f1f; --codehead:#2b2b2b; }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text)} body{font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.7}

    .app{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:100vh;transition:grid-template-columns .3s ease}.app.artifact-open{grid-template-columns:240px minmax(0,1fr) minmax(320px,50vw)}
    .overlay{display:none;position:fixed;inset:0;background:rgba(26,26,26,.24);z-index:15}.sidebar{background:var(--sidebar);border-right:1px solid var(--border);padding:18px 14px;display:flex;flex-direction:column;gap:18px;z-index:20}
    .sidebar-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{color:var(--accent);letter-spacing:.12em;font-size:14px;display:flex;gap:8px;align-items:center}.sidebar-close{display:none;width:28px;height:28px;align-items:center;justify-content:center;color:var(--accent);font-size:18px}
    .new-chat{border:1px solid var(--accent);color:var(--accent);padding:10px 12px;border-radius:0;text-align:left}.history-title{font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;padding-top:4px;border-top:1px solid var(--border)}.history-list{display:grid;gap:6px}.history-item{padding:10px 8px;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}.history-item.active,.history-item:hover{background:rgba(200,75,49,.08);color:var(--text)}
    .main{display:flex;flex-direction:column;min-width:0}.topbar{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}.topbar-right{display:flex;align-items:center;gap:12px}.menu-btn{display:none;font-size:20px;color:var(--accent)}.top-query{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.review-toggle{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:7px 12px;font-size:12px;color:var(--muted)}.review-toggle.active{color:var(--text);border-color:rgba(212,107,77,.45);background:rgba(212,107,77,.08)}.rule{height:1px;background:var(--border);margin:0 24px}.content-wrap{flex:1;overflow:auto;padding:28px 24px 124px}.article-shell{max-width:760px;margin:0 auto;width:100%;padding-left:20px;padding-right:20px}
    .home-state{min-height:calc(100vh - 188px);display:grid;place-items:center;text-align:center}.home-inner{width:min(100%,760px)}.hero-mark{color:var(--accent);font-size:46px;margin-bottom:12px}.hero-title{font-family:'Inter',system-ui,sans-serif;font-size:clamp(30px,4.8vw,40px);font-weight:500;letter-spacing:-0.03em;margin:0 0 26px}
    .composer{position:relative;width:100%}.composer-input{width:100%;background:rgba(255,255,255,.45);border:1px solid var(--border);border-radius:12px;padding:18px 64px 18px 18px;outline:none;box-shadow:0 10px 30px rgba(26,26,26,.06)}.composer-input::placeholder{color:var(--muted)}.send-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:999px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:14px;line-height:1;z-index:2;pointer-events:auto}
    .chips{margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.chip{border:1px solid var(--border);padding:8px 12px;background:transparent}
    .thread{display:none}.thread.active{display:block}
    .message{margin:0 0 34px}
    .message-body{font-size:16px;line-height:1.75;overflow-wrap:anywhere}.message-body h1,.message-body h2,.message-body h3,.message-body h4{font-family:'Inter',system-ui,sans-serif;line-height:1.25;font-weight:600;letter-spacing:-0.02em;margin:1.35em 0 .72em}.message-body h2{font-size:22px}.message-body h1:first-child,.message-body h2:first-child,.message-body p:first-child{margin-top:0}.message-body p,.message-body li{font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.75;margin:0 0 18px}.message-body ul,.message-body ol{padding-left:1.3rem}.message-body sup a{color:var(--accent);text-decoration:none;font-size:.8em;vertical-align:super}.message-body blockquote{border-left:1px solid var(--accent);margin:1rem 0 1.5rem;padding-left:1rem;color:var(--muted)}.message-body pre{display:none}.message-body code{font-family:'JetBrains Mono',monospace}.placeholder{color:var(--muted)}
    .review-panel{margin:0 0 18px;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.72);overflow:hidden}.review-summary{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;cursor:pointer}.review-summary-left{display:flex;flex-direction:column;gap:2px}.review-kicker{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}.review-title{font-size:14px;font-weight:500;color:var(--text)}.review-chevron{color:var(--muted);font-size:12px}.review-body{border-top:1px solid var(--border);padding:12px 14px;display:grid;gap:12px}.review-agent{display:grid;gap:6px}.review-agent-name{font-size:12px;font-weight:600;color:var(--text)}.review-agent-headline{font-size:13px;color:var(--text)}.review-agent-summary,.review-agent-points{font-size:12px;line-height:1.55;color:var(--muted)}.artifact-cards{display:grid;gap:12px;margin:14px 0 24px}.artifact-card{border:1px solid var(--border);border-radius:16px;padding:14px 16px;background:var(--surface);box-shadow:0 8px 24px rgba(0,0,0,.04)}.artifact-meta{display:flex;justify-content:space-between;gap:12px;align-items:center}.artifact-name{font-size:14px;font-weight:500;color:var(--text)}.artifact-open{color:var(--accent);font-size:13px}.artifact-subtle{color:var(--muted);font-size:12px;margin-top:4px}
    .share-wrap{margin:12px 0 24px}.share-btn,.toast-copy{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--accent);color:var(--accent);padding:8px 12px}.share-btn[disabled]{opacity:.5;cursor:not-allowed}.toast{position:fixed;right:20px;bottom:92px;background:var(--surface);border:1px solid var(--border);padding:12px 14px;max-width:320px;display:none;z-index:40}.toast.show{display:block}
    .sources-inline{margin-top:18px;padding-top:10px}.sources-footnotes{display:grid;gap:6px;color:var(--muted);font-size:12px;line-height:1.5;opacity:.72}.sources-footnotes a{text-decoration:none;border-bottom:1px solid transparent}.sources-footnotes a:hover{border-color:currentColor}.sources-footnotes .domain{color:var(--muted)}.sources-footnotes .footnote-index{color:var(--muted)}
    .bottom-composer{display:none;position:fixed;left:240px;right:0;bottom:0;background:linear-gradient(to top,var(--bg) 70%, rgba(245,240,232,0));padding:16px 24px 20px;transition:right .3s ease}.bottom-composer.visible{display:block}.app.artifact-open .bottom-composer{right:min(320px,50vw)}.bottom-composer .composer{max-width:760px;margin:0 auto;padding-left:20px;padding-right:20px}.bottom-composer .composer-input{border-radius:12px;background:var(--surface);box-shadow:none;padding:16px 60px 16px 16px}.bottom-composer .send-btn{width:30px;height:30px;font-size:14px;right:14px}.status{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.12em}
    .artifact-panel{position:relative;border-left:1px solid var(--border);background:var(--codebg);color:#f4f4f4;transform:translateX(100%);transition:transform .3s ease;overflow:hidden;display:flex;flex-direction:column}.app.artifact-open .artifact-panel{transform:translateX(0)}
    .artifact-header{display:flex;align-items:center;gap:10px;justify-content:space-between;padding:12px 14px;background:var(--codehead);border-bottom:1px solid rgba(255,255,255,.08)}.artifact-left{display:flex;align-items:center;gap:10px;min-width:0}.artifact-close{color:#fff;font-size:18px;width:24px;height:24px;display:grid;place-items:center}.artifact-tabs{display:flex;gap:8px;overflow:auto}.artifact-tab{padding:6px 10px;border:1px solid rgba(255,255,255,.12);color:#ddd;white-space:nowrap}.artifact-tab.active{background:rgba(255,255,255,.08);color:#fff}.artifact-actions{display:flex;gap:8px}.artifact-action{padding:6px 10px;border:1px solid rgba(255,255,255,.12);color:#fff}
    .artifact-body{flex:1;overflow:auto}.artifact-body pre{margin:0;padding:18px}.artifact-body code{font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.6}.artifact-markdown{font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.75}.artifact-markdown p{margin:0 0 16px}.artifact-markdown h1,.artifact-markdown h2,.artifact-markdown h3{font-weight:600;line-height:1.25;margin:1.2em 0 .6em}.artifact-markdown ul,.artifact-markdown ol{padding-left:1.2rem}
    @media (max-width:900px){.app,.app.artifact-open{grid-template-columns:1fr}.overlay.open{display:block}.sidebar{position:fixed;inset:0 auto 0 0;width:240px;transform:translateX(-100%);transition:transform .25s ease;box-shadow:12px 0 30px rgba(0,0,0,.08)}.sidebar.open{transform:translateX(0)}.sidebar-close{display:inline-flex}.menu-btn{display:block}.topbar{padding:0 16px}.rule{margin:0 16px}.content-wrap{padding:22px 0 120px}.article-shell{padding-left:20px;padding-right:20px}.chips{justify-content:flex-start}.home-state{text-align:left}.hero-title{font-size:32px}.bottom-composer{left:0;right:0;padding:12px 0 16px}.app.artifact-open .bottom-composer{right:0}.bottom-composer .composer{padding-left:20px;padding-right:20px}.message-body{font-size:16px}.message-body p,.message-body li{font-size:16px}.toast{left:20px;right:20px;max-width:none}.artifact-panel{position:fixed;inset:0;z-index:35;border-left:0;width:100%}}
  </style>
</head>
<body>
  <div id="overlay" class="overlay"></div>
  <div id="app" class="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head"><div class="brand"><span>◆</span><span>MENTROPHI</span></div><button id="sidebarClose" class="sidebar-close" aria-label="Close sidebar">✕</button></div>
      <button id="newChatBtn" class="new-chat">+ New chat</button>
      <div class="history-title">Recents</div>
      <div id="historyList" class="history-list"></div>
    </aside>
    <main class="main">
      <div class="topbar"><button id="menuBtn" class="menu-btn">☰</button><div id="topQuery" class="top-query">New chat</div><div class="topbar-right"><button id="reviewToggle" class="review-toggle" type="button">Two-Agent Review</button><div id="statusText" class="status">Idle</div></div></div>
      <div class="rule"></div>
      <div class="content-wrap"><div class="article-shell"><section id="homeState" class="home-state"><div class="home-inner"><div class="hero-mark">◆</div><h1 class="hero-title">How can I help you today?</h1><div class="composer"><input id="homeInput" class="composer-input" type="text" placeholder="Ask Mentrophi" autocomplete="off" /><button id="homeSend" type="button" class="send-btn" aria-label="Send">↑</button></div><div class="chips"><button class="chip" data-query="Climate tipping points">Climate tipping points</button><button class="chip" data-query="How LLMs work">How LLMs work</button><button class="chip" data-query="Stoicism today">Stoicism today</button></div></div></section><section id="threadView" class="thread"><div id="threadBody"></div></section></div></div>
      <div id="bottomComposer" class="bottom-composer"><div class="composer"><input id="followupInput" class="composer-input" type="text" placeholder="Reply to Mentrophi..." autocomplete="off" /><button id="followupSend" type="button" class="send-btn" aria-label="Send">↑</button></div></div>
    </main>
    <aside id="artifactPanel" class="artifact-panel" aria-hidden="true"><div class="artifact-header"><div class="artifact-left"><button id="artifactClose" class="artifact-close" aria-label="Close artifact">✕</button><div id="artifactTabs" class="artifact-tabs"></div></div><div class="artifact-actions"><button id="artifactCopy" class="artifact-action">Copy</button><button id="artifactDownload" class="artifact-action">↓</button></div></div><div class="artifact-body"><div id="artifactMarkdown" class="artifact-markdown" style="display:none;padding:22px;color:#f4f4f4"></div><pre id="artifactPre"><code id="artifactCode"></code></pre></div></aside>
  </div>
  <div id="toast" class="toast"></div>
  <script>
    const STORAGE_KEY='mentrophi-history-v2';
    const state={sessions:[],activeSessionId:null,currentAnswer:'',currentSources:[],abortController:null,currentMeta:{codeMode:false},artifactFiles:[],activeArtifactIndex:0,twoAgentReview:false};
    const app=document.getElementById('app'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('overlay'),menuBtn=document.getElementById('menuBtn'),sidebarClose=document.getElementById('sidebarClose'),newChatBtn=document.getElementById('newChatBtn'),historyList=document.getElementById('historyList'),homeState=document.getElementById('homeState'),threadView=document.getElementById('threadView'),threadBody=document.getElementById('threadBody'),homeInput=document.getElementById('homeInput'),homeSend=document.getElementById('homeSend'),followupInput=document.getElementById('followupInput'),followupSend=document.getElementById('followupSend'),bottomComposer=document.getElementById('bottomComposer'),statusText=document.getElementById('statusText'),topQuery=document.getElementById('topQuery'),reviewToggle=document.getElementById('reviewToggle'),toast=document.getElementById('toast'),artifactPanel=document.getElementById('artifactPanel'),artifactTabs=document.getElementById('artifactTabs'),artifactCode=document.getElementById('artifactCode'),artifactMarkdown=document.getElementById('artifactMarkdown'),artifactPre=document.getElementById('artifactPre'),artifactClose=document.getElementById('artifactClose'),artifactCopy=document.getElementById('artifactCopy'),artifactDownload=document.getElementById('artifactDownload');
    marked.setOptions({breaks:true,gfm:true});
    function escapeHtml(text=''){return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
    function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('open');} function openSidebar(){sidebar.classList.add('open');overlay.classList.add('open');}
    function openArtifact(index=0){state.activeArtifactIndex=index;app.classList.add('artifact-open');artifactPanel.setAttribute('aria-hidden','false');renderArtifactPanel();}
    function closeArtifact(){app.classList.remove('artifact-open');artifactPanel.setAttribute('aria-hidden','true');}
    function defaultSession(){return {id:crypto.randomUUID(),title:'New chat',query:'',history:[],messages:[],meta:{codeMode:false}}}
    function migrateSessions(raw=[]){return raw.map(session=>({id:session.id||crypto.randomUUID(),title:session.title||session.query||'New chat',query:session.query||'',history:Array.isArray(session.history)?session.history:[],messages:Array.isArray(session.messages)?session.messages:(session.answer?[{role:'assistant',content:session.answer,sources:session.sources||[],meta:session.meta||{}}]:[]),meta:session.meta||{codeMode:false}}));}
    function saveSessions(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.sessions));}
    function loadSessions(){try{state.sessions=migrateSessions(JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'));}catch{state.sessions=[];}}
    function createSession(initialQuery=''){const session=defaultSession(); if(initialQuery){session.title=initialQuery.slice(0,42); session.query=initialQuery;} state.sessions.unshift(session); state.activeSessionId=session.id; saveSessions(); renderHistory(); return session;}
    function getActiveSession(){return state.sessions.find(session=>session.id===state.activeSessionId)||null}
    function renderHistory(){historyList.innerHTML=state.sessions.map(session=>`<button class="history-item ${session.id===state.activeSessionId?'active':''}" data-id="${session.id}">${escapeHtml(session.title||'New chat')}</button>`).join(''); historyList.querySelectorAll('.history-item').forEach(button=>button.addEventListener('click',()=>{openSession(button.dataset.id); closeSidebar();}));}
    function showToast(html){toast.innerHTML=html;toast.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>toast.classList.remove('show'),4000)}
    async function copyText(text){try{await navigator.clipboard.writeText(text);return true}catch{return false}}
    function inferExtension(lang=''){const map={js:'js',javascript:'js',ts:'ts',typescript:'ts',py:'py',python:'py',html:'html',css:'css',json:'json',sql:'sql',sh:'sh',bash:'sh',tsx:'tsx',jsx:'jsx'};return map[(lang||'').toLowerCase()]||'txt'}
    function languageLabel(lang=''){const map={js:'JavaScript',javascript:'JavaScript',ts:'TypeScript',typescript:'TypeScript',py:'Python',python:'Python',html:'HTML',css:'CSS',json:'JSON',sql:'SQL',sh:'Shell',bash:'Shell'};return map[(lang||'').toLowerCase()]||((lang||'Text').replace(/^./,c=>c.toUpperCase()))}
    function extractCodeBlocks(markdown=''){const blocks=[];const regex=/```([\w#+.-]*)\n([\s\S]*?)(```|$)/g;let match;let idx=1;while((match=regex.exec(markdown))){const language=(match[1]||'').toLowerCase();const content=(match[2]||'').trim();if(!content) continue;blocks.push({name:`app-${idx}.${inferExtension(language)}`,language,content,incomplete:match[3]!== '```',kind:'code'});idx+=1}return blocks}
    function extractWritingArtifact(markdown=''){const prose=(markdown||'').replace(/```[\w#+.-]*\n[\s\S]*?(?:```|$)/g,'').trim(); if(!prose) return []; const paragraphCount=prose.split(/\n\s*\n/).filter(Boolean).length; const looksStructured=/(^|\n)(#|##|###|[-*] |\d+\. )/m.test(prose); const substantial=prose.length>1400 || paragraphCount>=6 || (prose.length>900 && looksStructured); if(!substantial) return []; return [{name:'draft.md',language:'markdown',content:prose,incomplete:false,kind:'writing'}]; }
    function emptyReview(){return {open:false,builder:null,critic:null};}
    function renderReviewPanel(review,index){if(!review || (!review.builder && !review.critic)) return ''; const title=(review.builder&&review.critic)?'Builder and Critic reviewed this answer':'Two-Agent Review'; const builder=review.builder?`<section class="review-agent"><div class="review-agent-name">Builder</div><div class="review-agent-headline">${escapeHtml(review.builder.headline||'Built a first approach')}</div><div class="review-agent-summary">${escapeHtml(review.builder.summary||'')}</div>${Array.isArray(review.builder.focus)&&review.builder.focus.length?`<div class="review-agent-points">${escapeHtml(review.builder.focus.join(' • '))}</div>`:''}</section>`:''; const critic=review.critic?`<section class="review-agent"><div class="review-agent-name">Critic</div><div class="review-agent-headline">${escapeHtml(review.critic.headline||'Pressure-tested the approach')}</div><div class="review-agent-summary">${escapeHtml(review.critic.summary||'')}</div>${Array.isArray(review.critic.focus)&&review.critic.focus.length?`<div class="review-agent-points">${escapeHtml(review.critic.focus.join(' • '))}</div>`:''}</section>`:''; return `<details class="review-panel" ${review.open?'open':''} data-review-index="${index}"><summary class="review-summary"><div class="review-summary-left"><div class="review-kicker">Optional review</div><div class="review-title">${title}</div></div><div class="review-chevron">Open</div></summary><div class="review-body">${builder}${critic}</div></details>`;}
    function renderArtifactPanel(){const files=state.artifactFiles||[];const active=files[state.activeArtifactIndex]||files[0];if(!active){artifactTabs.innerHTML='';artifactCode.textContent='';artifactMarkdown.innerHTML='';return;}artifactTabs.innerHTML=files.map((file,index)=>`<button class="artifact-tab ${index===state.activeArtifactIndex?'active':''}" data-index="${index}">${escapeHtml(file.kind==='writing'?'draft.md':file.name)}${file.incomplete?'…':''}</button>`).join('');artifactTabs.querySelectorAll('.artifact-tab').forEach(btn=>btn.addEventListener('click',()=>{state.activeArtifactIndex=Number(btn.dataset.index);renderArtifactPanel();})); if(active.kind==='writing'){artifactPre.style.display='none';artifactMarkdown.style.display='block';artifactMarkdown.innerHTML=marked.parse(active.content||'');} else {artifactMarkdown.style.display='none';artifactPre.style.display='block';artifactCode.className=active.language?`language-${active.language}`:'';artifactCode.textContent=active.content||'';if(window.hljs){window.hljs.highlightElement(artifactCode);}}}
    async function shareFiles(files, query=''){files=(files||[]).filter(file=>!file.incomplete);if(!files.length)return;const btn=document.querySelector('.share-btn');if(btn)btn.disabled=true;try{const res=await fetch('/api/snippet/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({files,query})});const data=await res.json();if(!res.ok)throw new Error(data.error||'Failed to share');showToast(`Shared! <a class="toast-copy" href="${data.url}" target="_blank">${data.url}</a>`);const link=toast.querySelector('.toast-copy');if(link)link.addEventListener('click',async(e)=>{e.preventDefault();await copyText(data.url);showToast('Link copied.');window.open(data.url,'_blank');},{once:true});}catch(error){showToast(escapeHtml(error.message))}finally{if(btn)btn.disabled=false;}}
    function renderMessageContent(message,index){const reviewHtml=message.role==='assistant'?renderReviewPanel(message.review,index):''; const codeFiles=extractCodeBlocks(message.content||''); const writingFiles=codeFiles.length?[]:extractWritingArtifact(message.content||''); const files=[...codeFiles,...writingFiles]; const proseSource=(message.content||'').replace(/```[\w#+.-]*\n[\s\S]*?(?:```|$)/g,'').trim(); let html=proseSource?marked.parse(proseSource):''; const superscriptDigits={'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'}; html=html.replace(/\[(\d+)\]/g,(_,n)=>`<sup><a href="#source-${index+1}-${n}">${String(n).split('').map(d=>superscriptDigits[d]||d).join('')}</a></sup>`); if(writingFiles.length){const previewParas=proseSource.split(/\n\s*\n/).filter(Boolean).slice(0,2).join('\n\n'); html=previewParas?marked.parse(previewParas):html; } let extra=reviewHtml; if(files.length){extra += `<div class="artifact-cards">${files.map((file,fileIndex)=>`<div class="artifact-card"><div class="artifact-meta"><div><div class="artifact-name">${escapeHtml(file.kind==='writing'?'Long-form draft':file.name)}</div><div class="artifact-subtle">${escapeHtml(file.kind==='writing'?'Open separately for reading or editing':languageLabel(file.language))}${file.incomplete?' · generating…':''}</div></div><button class="artifact-open" data-file-index="${fileIndex}" data-message-index="${index}">Open</button></div></div>`).join('')}</div>`; const shareableFiles = files.filter(file=>!file.incomplete && file.kind==='code'); if(shareableFiles.length){extra += `<div class="share-wrap"><button class="share-btn" data-message-index="${index}">◆ Share this code</button></div>`; }}
      if(message.role==='assistant' && Array.isArray(message.sources) && message.sources.length){ extra += `<section class="sources-inline"><div class="sources-footnotes">${message.sources.map((source,sourceIndex)=>{const n=sourceIndex+1; const sup=String(n).split('').map(d=>superscriptDigits[d]||d).join(''); const domain=source.domain||source.displayUrl||''; return `<div id="source-${index+1}-${n}"><span class="footnote-index">${sup}</span> <a href="${escapeHtml(source.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(source.title||'Untitled source')}</a> <span class="domain">— ${escapeHtml(domain)}</span></div>`}).join('')}</div></section>`; }
      if(!html && extra){html = '<p>I put the code into an artifact so you can open it while it finishes generating.</p>'; }
      return html + extra;
    }
    function renderThread(){const session=getActiveSession(); if(!session||!session.messages.length){threadBody.innerHTML='<div class="placeholder">Start a conversation.</div>';  return;} threadBody.innerHTML=session.messages.map((message,index)=>`<article class="message ${message.role}"><div class="message-body">${renderMessageContent(message,index)}</div></article>`).join(''); threadBody.querySelectorAll('.artifact-open').forEach(btn=>btn.addEventListener('click',()=>{const msg=session.messages[Number(btn.dataset.messageIndex)]; const codeFiles=extractCodeBlocks(msg.content||''); const writingFiles=codeFiles.length?[]:extractWritingArtifact(msg.content||''); state.artifactFiles=[...codeFiles,...writingFiles]; openArtifact(Number(btn.dataset.fileIndex));})); threadBody.querySelectorAll('.share-btn').forEach(btn=>btn.addEventListener('click',()=>{const msg=session.messages[Number(btn.dataset.messageIndex)]; shareFiles(extractCodeBlocks(msg.content||''), session.query||session.title||'');})); }
    function setStatus(text){statusText.textContent=text}
    function syncReviewToggle(){reviewToggle.classList.toggle('active',!!state.twoAgentReview); reviewToggle.textContent=state.twoAgentReview?'Two-Agent Review On':'Two-Agent Review';}
    function syncReviewToggle(){reviewToggle.classList.toggle('active',!!state.twoAgentReview); reviewToggle.textContent=state.twoAgentReview?'Two-Agent Review On':'Two-Agent Review';}
    function showHome(){homeState.style.display='grid';threadView.classList.remove('active');topQuery.textContent='New chat';threadBody.innerHTML='';bottomComposer.classList.remove('visible');closeArtifact();setStatus('Idle');}
    function showThread(session){homeState.style.display='none';threadView.classList.add('active');topQuery.textContent=session.title||session.query||'Chat';renderThread();bottomComposer.classList.add('visible');setStatus('Ready');}
    function openSession(sessionId){state.activeSessionId=sessionId;renderHistory();const session=getActiveSession();if(!session||!session.messages.length)showHome();else showThread(session);saveSessions();}
    async function runResearch(query){const trimmed=query.trim(); if(!trimmed) return; if(state.abortController) state.abortController.abort(); state.abortController=new AbortController(); let session=getActiveSession(); if(!session) session=createSession(trimmed); if(!session.messages.length && session.title==='New chat'){session.title=trimmed.slice(0,42); session.query=trimmed;} session.query = session.query || trimmed; session.history.push({role:'user',content:trimmed}); session.messages.push({role:'user',content:trimmed,sources:[],meta:{}}); const assistantMessage={role:'assistant',content:'',sources:[],meta:{codeMode:false}}; session.messages.push(assistantMessage); state.currentAnswer=''; renderHistory(); showThread(session); setStatus(researchModeLabel(trimmed)); saveSessions(); try{const response=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:trimmed,history:session.history}),signal:state.abortController.signal}); if(!response.ok||!response.body){let message='Request failed.'; try{const error=await response.json(); message=error.error||message;}catch{} throw new Error(message);} const reader=response.body.getReader(); const decoder=new TextDecoder(); let buffer=''; let finished=false; while(!finished){const {value,done}=await reader.read(); if(done) break; buffer+=decoder.decode(value,{stream:true}); const events=buffer.split('\n\n'); buffer=events.pop()||''; for(const rawEvent of events){const lines=rawEvent.split('\n').filter(Boolean); let eventName='message'; let dataLine=''; for(const line of lines){if(line.startsWith('event:')) eventName=line.slice(6).trim(); if(line.startsWith('data:')) dataLine+=line.slice(5).trim();} if(!dataLine) continue; const payload=JSON.parse(dataLine); if(eventName==='meta'){assistantMessage.meta=payload||{codeMode:false};} else if(eventName==='sources'){assistantMessage.sources=payload.sources||[]; renderThread(); saveSessions();} else if(eventName==='chunk'){state.currentAnswer+=payload.content||''; assistantMessage.content=state.currentAnswer; renderThread(); setStatus('Replying'); saveSessions();} else if(eventName==='error'){throw new Error(payload.error||'Streaming error.');} else if(eventName==='done'){finished=true; break;}}} session.history.push({role:'assistant',content:assistantMessage.content.trim()}); setStatus('Complete'); saveSessions(); } catch(error){ if(error.name==='AbortError'){setStatus('Canceled'); return;} assistantMessage.content=error.message||'Something went wrong.'; renderThread(); setStatus('Error'); } finally {state.abortController=null;} }
    function researchModeLabel(query){return /(today|latest|current|news|look up|search the web|verify|official docs|documentation|release notes|changelog|who won|weather|forecast|score|odds)/i.test(query)?'Checking':'Thinking';}
    function submitInput(input){const value=input.value.trim(); if(!value) return; input.value=''; runResearch(value);}
    [homeInput,followupInput].forEach(input=>input.addEventListener('keydown',event=>{if(event.key==='Enter'){event.preventDefault(); submitInput(input);}}));
    ['click','pointerup','touchend'].forEach(evt=>homeSend.addEventListener(evt,(e)=>{e.preventDefault();submitInput(homeInput);})); ['click','pointerup','touchend'].forEach(evt=>followupSend.addEventListener(evt,(e)=>{e.preventDefault();submitInput(followupInput);})); reviewToggle.addEventListener('click',()=>{state.twoAgentReview=!state.twoAgentReview; syncReviewToggle();}); reviewToggle.addEventListener('click',()=>{state.twoAgentReview=!state.twoAgentReview; syncReviewToggle();}); newChatBtn.addEventListener('click',()=>{const session=createSession(''); openSession(session.id); homeInput.focus(); closeSidebar(); closeArtifact();}); menuBtn.addEventListener('click',openSidebar); sidebarClose.addEventListener('click',closeSidebar); overlay.addEventListener('click',()=>{closeSidebar(); closeArtifact();}); artifactClose.addEventListener('click',closeArtifact);
    artifactCopy.addEventListener('click',async()=>{const file=state.artifactFiles[state.activeArtifactIndex]; if(!file)return; await copyText(file.content||''); const t=artifactCopy.textContent; artifactCopy.textContent='Copied ✓'; setTimeout(()=>artifactCopy.textContent=t,2000);}); artifactDownload.addEventListener('click',()=>{const file=state.artifactFiles[state.activeArtifactIndex]; if(!file)return; const blob=new Blob([file.content||''],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=file.name; a.click(); URL.revokeObjectURL(a.href);});
    document.querySelectorAll('.chip').forEach(chip=>chip.addEventListener('click',()=>{homeInput.value=chip.dataset.query||''; submitInput(homeInput);}));
    loadSessions(); if(state.sessions.length){state.activeSessionId=state.sessions[0].id; openSession(state.activeSessionId);} else {showHome(); renderHistory();}
  </script>

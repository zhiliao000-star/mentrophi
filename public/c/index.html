<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentrophi Snippet Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root { --bg:#F5F0E8; --surface:#EDEAE0; --text:#1A1A1A; --accent:#C84B31; --border:#D4CFC4; --muted:#6B6560; }
    *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace}
    a{color:inherit} .wrap{min-height:100vh;display:grid;grid-template-rows:auto 1fr}
    .head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap}
    .brand{color:var(--accent);letter-spacing:.12em;font-size:14px}.title{font-family:'Playfair Display',serif;font-size:24px}
    .meta{font-size:12px;color:var(--muted)} .layout{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:calc(100vh - 70px)}
    .tree{border-right:1px solid var(--border);padding:18px;background:rgba(237,234,224,.45)} .tree-list{display:grid;gap:6px}
    .file-btn{display:block;width:100%;text-align:left;padding:8px 10px;text-decoration:none}.file-btn.active,.file-btn:hover{background:rgba(200,75,49,.08)}
    .main{padding:18px}.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}.toolbar-actions{display:flex;gap:8px;flex-wrap:wrap}
    .toolbtn{border:1px solid var(--border);padding:8px 10px;text-decoration:none}.codebox{border:1px solid var(--border);background:#fff;overflow:auto}.codebox pre{margin:0;padding:18px;font-size:14px;line-height:1.7}
    .picker{display:none;width:100%;padding:10px;border:1px solid var(--border);background:#fff;margin-bottom:12px}
    noscript{display:block;padding:18px;color:var(--muted)}
    @media (max-width: 900px){.layout{grid-template-columns:1fr}.tree{display:none}.picker{display:block}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="head">
      <div>
        <div class="brand">◆ MENTROPHI</div>
        <div id="snippetTitle" class="title">Loading snippet…</div>
      </div>
      <div class="meta" id="snippetMeta">Preparing viewer…</div>
    </header>
    <div class="layout">
      <aside class="tree"><div id="treeList" class="tree-list"></div></aside>
      <main class="main">
        <select id="filePicker" class="picker"></select>
        <div class="toolbar">
          <div id="currentFile">—</div>
          <div class="toolbar-actions">
            <button id="copyBtn" class="toolbtn">Copy</button>
            <a id="rawBtn" class="toolbtn" target="_blank" rel="noopener noreferrer">Raw</a>
            <button id="downloadBtn" class="toolbtn">Download</button>
          </div>
        </div>
        <div class="codebox"><pre><code id="codeEl">Loading…</code></pre></div>
        <noscript>This viewer needs JavaScript to load the selected snippet. You can still access raw files if you already know the snippet API URL.</noscript>
      </main>
    </div>
  </div>
  <script>
    const id = location.pathname.split('/').filter(Boolean).pop();
    const codeEl = document.getElementById('codeEl');
    const treeList = document.getElementById('treeList');
    const filePicker = document.getElementById('filePicker');
    const currentFile = document.getElementById('currentFile');
    const snippetTitle = document.getElementById('snippetTitle');
    const snippetMeta = document.getElementById('snippetMeta');
    const copyBtn = document.getElementById('copyBtn');
    const rawBtn = document.getElementById('rawBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    let snippet = null; let activeFile = null;

    function escapeHtml(text=''){return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function setFile(name){
      activeFile = (snippet.files||[]).find(f=>f.name===name) || snippet.files?.[0];
      if(!activeFile)return;
      currentFile.textContent = `// ${activeFile.name}`;
      codeEl.className = activeFile.language ? `language-${activeFile.language}` : '';
      codeEl.textContent = activeFile.content || '';
      rawBtn.href = `/api/snippet/${snippet.id}?raw=true&file=${encodeURIComponent(activeFile.name)}`;
      filePicker.value = activeFile.name;
      treeList.querySelectorAll('.file-btn').forEach(btn=>btn.classList.toggle('active', btn.dataset.file===activeFile.name));
      if(window.hljs){window.hljs.highlightElement(codeEl);}
    }
    function render(){
      snippetTitle.textContent = snippet.title || snippet.id;
      snippetMeta.textContent = `${new Date(snippet.created_at).toLocaleString()} · ${snippet.view_count || 0} views`;
      const options = (snippet.files||[]).map(f=>`<option value="${f.name}">${f.name}</option>`).join('');
      filePicker.innerHTML = options;
      treeList.innerHTML = (snippet.files||[]).map(f=>`<a href="#" class="file-btn" data-file="${f.name}">📄 ${escapeHtml(f.name)}</a>`).join('');
      treeList.querySelectorAll('.file-btn').forEach(btn=>btn.addEventListener('click',(e)=>{e.preventDefault();setFile(btn.dataset.file);}));
      setFile(snippet.files?.[0]?.name);
    }

    filePicker.addEventListener('change',()=>setFile(filePicker.value));
    copyBtn.addEventListener('click', async ()=>{if(!activeFile)return; await navigator.clipboard.writeText(activeFile.content || ''); const t=copyBtn.textContent; copyBtn.textContent='Copied!'; setTimeout(()=>copyBtn.textContent=t,2000);});
    downloadBtn.addEventListener('click', ()=>{if(!activeFile)return; const blob=new Blob([activeFile.content||''],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=activeFile.name; a.click(); URL.revokeObjectURL(a.href);});

    (async()=>{
      try {
        const res = await fetch(`/api/snippet/${id}`);
        snippet = await res.json();
        if(!res.ok) throw new Error(snippet.error || 'Failed to load snippet');
        render();
        fetch(`/api/snippet/view/${id}`, { method:'POST' }).catch(()=>{});
      } catch (error) {
        snippetTitle.textContent = 'Snippet not found';
        snippetMeta.textContent = error.message;
        codeEl.textContent = error.message;
      }
    })();
  </script>
</body>
</html>
